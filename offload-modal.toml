# offload configuration for running mngr tests on Modal
[offload]
max_parallel = 50
test_timeout_secs = 300
stream_output = true
sandbox_project_root = "/code/mngr"

# Run scripts/post-source-setup.sh after offload applies its thin diff
# to the cached checkpoint image. The same script is the final RUN step
# in libs/mngr/imbue/mngr/resources/Dockerfile, so the offload-cached
# environment matches a from-scratch Dockerfile build (uv sync rerun,
# image_commit_hash refreshed, .git normalized for the new HEAD).
post_patch_cmd = "bash scripts/post-source-setup.sh"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile"

[checkpoint]
# Commits touching any of these files trigger a fresh checkpoint image.
# Everything else rides the checkpoint via thin git diff.
#
# pyproject.toml + uv.lock are here because Python deps are installed
# at image build time via `uv sync --all-packages` in the mngr Dockerfile
# (any per-package dependency change necessarily also changes uv.lock).
#
# Per-package pyproject.toml files are deliberately NOT build inputs: they
# churn often and each churn cost a full checkpoint rebuild (+~2min on ~7%
# of runs). They used to be listed because a per-package metadata change
# made `uv run` in the sandbox consider editable installs stale and try to
# rebuild them, which fails with the sandbox's network disabled. Two things
# since removed that failure mode: post_patch_cmd reruns
# scripts/post-source-setup.sh (including `uv sync --all-packages`) after
# every thin diff -- with network available at image-build time -- so
# dist-info always matches the patched source, and test batches now invoke
# .venv/bin/pytest directly instead of `uv run pytest`, so no sandbox-time
# uv resolution happens at all.
build_inputs = [
    "libs/mngr/imbue/mngr/resources/Dockerfile",
    "pyproject.toml",
    "uv.lock",
]

[framework]
type = "pytest"
# Invoke the venv's pytest directly instead of `uv run pytest`: sandbox
# network is disabled, so uv's resolution/editability checks are pure
# latency and a failure mode (stale dist-info -> rebuild attempt -> no
# network). The bash wrapper prepends .venv/bin to PATH and sets
# VIRTUAL_ENV so the pytest process env matches what `uv run` provided.
# $PWD is the repo root in both contexts: in the sandbox offload's exec
# wrapper cd's to sandbox_project_root first; locally offload spawns
# discovery from the directory it was invoked in (the repo root).
command = "bash -c 'export PATH=\"$PWD/.venv/bin:$PATH\" VIRTUAL_ENV=\"$PWD/.venv\"; exec .venv/bin/pytest \"$@\"' --"
# --cov-report= (empty, and the sole --cov-report since reports are no
# longer in root addopts) disables ALL per-batch coverage reports: they
# walked every measured file in every batch but were never consumed -- CI
# combines the raw .coverage data files on the runner and enforces the
# gates there. The data file is still written (parallel=true +
# pytest-cov's finish-time combine), so coverage measurement is
# unaffected.
run_args = "--cov-fail-under=0 -p no:xdist --cov-report="

[groups.all]
retry_count = 0
# --no-cov is discovery-only (filters are passed to `pytest --collect-only`,
# never to batch execution): pytest-cov otherwise traces module imports
# during collection, which roughly quadruples its cost.
filters = "--no-cov -m 'not acceptance and not release and not flaky and not sdk_live and not minds_deployment and not minds_services and not minds_snapshot_resume'"

[groups.flaky]
retry_count = 4
filters = "--no-cov -m 'flaky and not acceptance and not release and not sdk_live and not minds_deployment and not minds_services and not minds_snapshot_resume'"

[history]
path = "offload-history-modal.jsonl"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**", ".coverage*"]
