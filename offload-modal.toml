# offload configuration for running mngr tests on Modal
[offload]
max_parallel = 100
test_timeout_secs = 60
stream_output = true
sandbox_project_root = "/code/mngr"
sandbox_init_cmd = "uv sync --all-packages"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile"

[framework]
type = "pytest"
command = "uv run pytest"
run_args = "--cov-fail-under=0 -p no:xdist"

[groups.all]
retry_count = 0
filters = "-m 'not acceptance and not release and not flaky'"

[groups.flaky]
retry_count = 10
filters = "-m 'flaky and not acceptance and not release'"

[checkpoint]
build_inputs = ["libs/mngr/imbue/mngr/resources/Dockerfile", "uv.lock"]

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**", ".coverage*"]
