# See https://pre-commit.com for more information
default_install_hook_types: [pre-commit, pre-push, post-checkout]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-added-large-files
        exclude: 'uv.lock'
-   repo: local
    hooks:
    -   id: ruff
        name: "Python formatter + import sorter (ruff)"
        entry: bash -c 'uv run ruff check --fix --force-exclude --config pyproject.toml "$@" && uv run ruff format --force-exclude --config pyproject.toml "$@"' --
        language: system
        types: [python]
    -   id: regenerate-cli-docs
        name: "Regenerate CLI markdown docs"
        entry: bash -c 'uv run python scripts/make_cli_docs.py && git diff --quiet libs/mngr/docs/commands/ libs/mngr/README.md'
        language: system
        files: 'libs/mngr/imbue/mngr/cli/.*\.py$|libs/mngr/imbue/mngr/main\.py$|scripts/make_cli_docs\.py$|libs/mngr/docs/commands/.*\.md$|^README\.md$|^libs/mngr/README\.md$'
        pass_filenames: false
    -   id: compile-style-guide
        name: "Compile style guide Python examples"
        entry: bash -c 'uv run python scripts/compile_style_guide.py && git diff --quiet scripts/style_guide.py'
        language: system
        files: '^style_guide\.md$|scripts/compile_style_guide\.py$|scripts/style_guide\.py$'
        pass_filenames: false
    -   id: uv-sync-pre-push
#        Runs before pushing whenever a push touches dependency files (e.g. after the code-guardian
#        stop hook merges origin/main and that merge updates uv.lock or a pyproject.toml). This keeps
#        the local environment in sync with the just-merged dependencies before any push-time gates run.
        name: "Sync workspace packages before push (deps changed)"
        entry: uv sync --all-packages
        language: system
        stages: [pre-push]
        files: '(^|/)(uv\.lock|pyproject\.toml)$'
        pass_filenames: false
    -   id: clean-stale-workspace-dirs
#        Without this, when a workspace member is removed, its directory and contents remain, which causes uv to explode with a cryptic error message any time you run any uv command
        name: "Clean stale workspace member directories"
        entry: bash -c 'for dir in apps/* libs/*; do if [ -d "$dir" ] && [ ! -f "$dir/pyproject.toml" ]; then rm -rf "$dir"; fi; done'
        language: system
        stages: [post-checkout]
        always_run: true
        pass_filenames: false
