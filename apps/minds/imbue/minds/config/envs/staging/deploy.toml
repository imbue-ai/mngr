# Staging tier deploy config -- read by deploy scripts.

modal_workspace = "minds-staging"
vault_path_prefix = "secrets/minds/staging"
cloudflare_domain = "minds-staging.com"

# Vault-backed per-env Modal Secrets (see dev/deploy.toml for the
# full explanation). The `litellm-connector` Modal Secret is pushed
# separately by the deploy code and intentionally does not appear
# here.
[secrets]
services = [
    "cloudflare",
    "litellm",
    "neon",
    "paid-accounts",
    "pool-ssh",
    "supertokens",
]

[lifecycle]
creates_resources = false
modal_env_strategy = "SHARED"
writes_local_state = false
tracks_generation = true

[min_containers]
# Keep one container of each app warm so the desktop client never pays
# a cold-boot penalty on auth / lease / tunnel hits.
connector = 1
litellm_proxy = 1
