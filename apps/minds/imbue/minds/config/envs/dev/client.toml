# Dev tier client config -- read by `minds run` when nothing more specific
# is passed via `--config-file` and no `_bundled/client.toml` is present.
#
# This is the default a fresh `uv run minds run` ends up with. The URLs
# point at the dev tier's shared Modal env (the `main` Modal environment
# inside the dev Modal workspace). Per-developer dynamic dev envs override
# these via `~/.minds/envs/<dev-name>.toml`.

connector_url = "https://CHANGE_ME--remote-service-connector-dev-fastapi-app.modal.run"
litellm_proxy_url = "https://CHANGE_ME--litellm-proxy-dev-litellm-app.modal.run"
