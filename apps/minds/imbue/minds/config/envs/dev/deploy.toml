# Dev tier deploy config -- read by deploy scripts and by `minds env create`.
#
# `modal_workspace` is the dev tier's Modal workspace. The dev tier has no
# shared Modal environment of its own -- every dev iterates against a
# *per-developer* Modal environment they pick when invoking the deploy
# scripts: `scripts/deploy_litellm.sh dev <my-env>`. There is no
# `modal_env` field here on purpose; staging/production tiers set it if
# they want a stable Modal env name baked in.

modal_workspace = "imbue-minds-dev"
vault_path_prefix = "secrets/minds/dev"
cloudflare_domain = "minds-dev.com"

oauth_google_client_id = ""
oauth_github_client_id = ""

[secrets]
services = [
    "cloudflare",
    "litellm",
    "litellm-connector",
    "neon",
    "paid-accounts",
    "pool-ssh",
    "supertokens",
]
