<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Loading / quitting / error takeover screen. Deep-maroon brand
       surface (#492222) with cream (#E9ECD9) text, matching the Minds
       app icon branding. */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #492222;
      color: #E9ECD9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    /* When a main-process modal (the /help report dialog opened from the error
       takeover's "Report a bug" button) overlays this screen, drop the
       window-drag region. macOS unions -webkit-app-region: drag across all
       visible views, so this full-window drag would otherwise intercept every
       click meant for the modal's interior -- the modal looks visible but
       nothing inside it is clickable. Mirrors the chrome titlebar's modal-open
       drag suppression. */
    body.modal-open {
      -webkit-app-region: no-drag;
    }
    /* Brand block: head illustration stacked above the wordmark, centered,
       18px apart. */
    .brand {
      /* Intro timing. --intro-delay is the opening beat of empty maroon before
         anything appears. The head takes the "first letter" slot; the wordmark
         letters then follow one --letter-step later, so the reveal cascades
         head -> M -> i -> n -> d -> s. --letter-step matches the letters' own
         internal per-letter stagger (~0.1s), so the head leads the M by the
         same beat that separates the letters. After the intro the wordmark
         loops; the head stays. */
      --intro-delay: 1s;
      --letter-step: 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-top: -36px;
      margin-bottom: 36px;
    }
    /* The head illustration is the first element to appear: it fades in one
       --letter-step BEFORE the M (the letters carry the extra offset), using
       the same 0.5s linear fade-in as a letter, then holds at full opacity
       instead of cycling (the wordmark loops without it). Shown immediately in
       the error state. */
    .illustration {
      opacity: 0;
      animation: head-fade-in 5.4s var(--intro-delay) forwards;
    }
    body.error .illustration {
      animation: none;
      opacity: 1;
    }
    /* Mirrors the fade-in portion of fade-letter-0 (the M), then stays. */
    @keyframes head-fade-in {
      0%    { opacity: 0; animation-timing-function: linear; }
      9.26% { opacity: 1; }
      100%  { opacity: 1; }
    }
    /* Wordmark letter animation. Offset one --letter-step after the head (see
       .illustration above) so the head leads the M rather than sharing its beat.
       Cycle = 5.4s: fade in 0.5s linear (0.1s stagger), hold visible 1s,
       fade out 1.8s cubic-bezier(.05,.25,.08,.99) (0.3s stagger), hold invisible 0.5s.
       Paths in markup are s, d, n, i, M (right-to-left), so :nth-child(5)
       targets M (first), :nth-child(1) targets s (last). */
    .wordmark path { opacity: 0; }
    /* Error state: freeze the animation and show every letter. */
    body.error .wordmark path {
      animation: none;
      opacity: 1;
    }
    .wordmark path:nth-child(5) { animation: fade-letter-0 5.4s calc(var(--intro-delay) + var(--letter-step)) infinite; }
    .wordmark path:nth-child(4) { animation: fade-letter-1 5.4s calc(var(--intro-delay) + var(--letter-step)) infinite; }
    .wordmark path:nth-child(3) { animation: fade-letter-2 5.4s calc(var(--intro-delay) + var(--letter-step)) infinite; }
    .wordmark path:nth-child(2) { animation: fade-letter-3 5.4s calc(var(--intro-delay) + var(--letter-step)) infinite; }
    .wordmark path:nth-child(1) { animation: fade-letter-4 5.4s calc(var(--intro-delay) + var(--letter-step)) infinite; }
    @keyframes fade-letter-0 {
      0%     { opacity: 0; animation-timing-function: linear; }
      9.26%  { opacity: 1; }
      35.19% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      68.52% { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes fade-letter-1 {
      0%     { opacity: 0; }
      1.85%  { opacity: 0; animation-timing-function: linear; }
      11.11% { opacity: 1; }
      40.74% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      74.07% { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes fade-letter-2 {
      0%     { opacity: 0; }
      3.70%  { opacity: 0; animation-timing-function: linear; }
      12.96% { opacity: 1; }
      46.30% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      79.63% { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes fade-letter-3 {
      0%     { opacity: 0; }
      5.56%  { opacity: 0; animation-timing-function: linear; }
      14.81% { opacity: 1; }
      51.85% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      85.19% { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes fade-letter-4 {
      0%     { opacity: 0; }
      7.41%  { opacity: 0; animation-timing-function: linear; }
      16.67% { opacity: 1; }
      57.41% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      90.74% { opacity: 0; }
      100%   { opacity: 0; }
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #E9ECD9;
    }
    /* Quitting state: a status line under the wordmark, shown only while the
       app is shutting down. Hidden during normal startup loading so that
       screen is visually unchanged. */
    .status {
      display: none;
      font-size: 14px;
      color: #E9ECD9;
      min-height: 18px;
      text-align: center;
    }
    body.quitting .status { display: block; }
    /* Error state */
    #error-view {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 32px;
    }
    #error-view h1 { margin-bottom: 12px; }
    .message {
      font-size: 14px;
      color: #E9ECD9;
      margin-bottom: 24px;
      max-width: 400px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      -webkit-app-region: no-drag;
    }
    .actions button {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary { background: #8EAFCB; color: #000000; }
    .btn-primary:hover { background: #7E9DB8; }
    .btn-secondary { background: #E9ECD9; color: #492222; }
    .btn-secondary:hover { background: #D8DBC2; }
    .toggle-details {
      background: none;
      border: none;
      color: #E9ECD9;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      margin-bottom: 12px;
      -webkit-app-region: no-drag;
    }
    .toggle-details:hover { color: #E9ECD9; }
    .details {
      display: none;
      width: 100%;
      max-width: 600px;
      max-height: 200px;
      overflow: auto;
      background: #f4f4f5;
      border-radius: 8px;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 12px;
      color: #492222;
      white-space: pre-wrap;
      word-break: break-all;
      -webkit-app-region: no-drag;
      user-select: text;
    }
    .details.visible { display: block; }
    /* One-shot report outcome (shown when the backend is down and we report the
       on-screen error directly via the main-process Sentry). */
    #report-result {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #E9ECD9;
      -webkit-app-region: no-drag;
    }
    #report-result.visible { display: flex; }
    #report-result code {
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      background: #f4f4f5;
      color: #492222;
      border-radius: 4px;
      padding: 2px 6px;
      user-select: text;
    }
    #report-copy-btn {
      background: #E9ECD9;
      color: #492222;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      cursor: pointer;
    }
    #report-copy-btn:hover { background: #D8DBC2; }
  </style>
</head>

  <div class="status" id="status-line"></div>
  <div id="error-view">
    <h1>Something went wrong</h1>
    <p class="message" id="error-message">Minds stopped unexpectedly.</p>
    <div class="actions">
      <button class="btn-primary" id="retry-btn">Retry</button>
      <button class="btn-secondary" id="report-btn">Report a bug</button>
      <button class="btn-secondary" id="log-btn">View full log</button>
    </div>
    <div id="report-result">
      <span id="report-result-text"></span>
      <code id="report-event-id"></code>
      <button id="report-copy-btn" type="button">Copy</button>
    </div>
    <button class="toggle-details" id="toggle-details-btn">Show details</button>
    <pre class="details" id="error-details"></pre>
  </div>

  <script>
    var errorView = document.getElementById('error-view');
    var statusLine = document.getElementById('status-line');

    // Quitting takeover: shell.html is loaded with a `#quitting` hash when a
    // committed quit flips every window to this page. Reveal the status line and
    // seed it before any IPC arrives so there's no empty flash.
    if (location.hash === '#quitting') {
      document.body.classList.add('quitting');
      statusLine.textContent = 'Quitting…';
    }

    // The latest error-details payload, retained so the report button knows whether the
    // backend is still up (use the full /help modal) or down (one-shot main-process report).
    var lastErrorData = null;

    document.getElementById('retry-btn').addEventListener('click', function() {
      if (window.minds) window.minds.retry();
    });
    document.getElementById('log-btn').addEventListener('click', function() {
      if (window.minds) window.minds.openLogFile();
    });

    var reportBtn = document.getElementById('report-btn');
    var reportResult = document.getElementById('report-result');
    var reportResultText = document.getElementById('report-result-text');
    var reportEventId = document.getElementById('report-event-id');
    var reportCopyBtn = document.getElementById('report-copy-btn');

    function showReportResult(text, eventId) {
      reportResultText.textContent = text;
      if (eventId) {
        reportEventId.textContent = eventId;
        reportEventId.style.display = '';
        reportCopyBtn.style.display = '';
      } else {
        reportEventId.textContent = '';
        reportEventId.style.display = 'none';
        reportCopyBtn.style.display = 'none';
      }
      reportResult.classList.add('visible');
    }

    reportCopyBtn.addEventListener('click', function() {
      try {
        if (navigator.clipboard) navigator.clipboard.writeText(reportEventId.textContent);
        reportCopyBtn.textContent = 'Copied';
        setTimeout(function() { reportCopyBtn.textContent = 'Copy'; }, 1500);
      } catch (e) {
        /* ignore */
      }
    });

    reportBtn.addEventListener('click', function() {
      if (!window.minds) return;
      // Backend still up (e.g. discovery-pipeline stall): open the full /help modal so the
      // report can include logs and diagnostics. Backend down: file a one-shot report of the
      // on-screen error via the main-process Sentry and surface the copyable event id.
      if (lastErrorData && lastErrorData.canUseBackendReport && window.minds.toggleHelp) {
        window.minds.toggleHelp('');
        return;
      }
      reportBtn.disabled = true;
      showReportResult('Sending report…', null);
      // Recent logs are always attached by the main-process report path.
      window.minds.reportError().then(function(res) {
        if (res && res.ok && res.eventId) {
          showReportResult('Report sent. Reference ID:', res.eventId);
        } else {
          reportBtn.disabled = false;
          showReportResult('Could not send the report.', null);
        }
      }, function() {
        reportBtn.disabled = false;
        showReportResult('Could not send the report.', null);
      });
    });
    document.getElementById('toggle-details-btn').addEventListener('click', function() {
      var el = document.getElementById('error-details');
      el.classList.toggle('visible');
      this.textContent = el.classList.contains('visible') ? 'Hide details' : 'Show details';
    });

    if (window.minds) {
      // Drives the status line in the quitting takeover (e.g. "Stopping 2
      // minds…", "Closing…"). During startup loading the same messages arrive
      // but the line stays hidden (no `quitting` class), so the loading screen
      // is unaffected.
      window.minds.onStatusUpdate(function(message) {
        if (message) statusLine.textContent = message;
      });
      // A main-process modal (the report dialog) opened from this screen
      // overlays the full window; toggle the drag-region suppression (see
      // body.modal-open) so its interior is actually clickable, then restore
      // the window drag when it closes.
      if (window.minds.onModalStateChanged) {
        window.minds.onModalStateChanged(function(data) {
          if (data) document.body.classList.toggle('modal-open', !!data.open);
        });
      }
      window.minds.onErrorDetails(function(data) {
        lastErrorData = data;
        // This page is reused (not reloaded) across takeovers, so clear any prior
        // report outcome and re-enable the button for the new error.
        reportResult.classList.remove('visible');
        reportBtn.disabled = false;
        document.body.classList.add('error');
        errorView.style.display = 'flex';
        if (data.message) document.getElementById('error-message').textContent = data.message;
        if (data.details) document.getElementById('error-details').textContent = data.details;
        // Optional per-takeover label for the primary action (e.g. "Restart
        // Minds" for the discovery-pipeline takeover). Falls back to the static
        // "Retry" label for the generic backend-crash case. Always reassigned so
        // a label set by a prior takeover (this page is reused, not reloaded,
        // when the chrome view is already on shell.html) does not linger.
        document.getElementById('retry-btn').textContent = data.actionLabel || 'Retry';
      });
    }
  </script>
</body>
</html>
