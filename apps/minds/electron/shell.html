<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .wordmark {
      margin-bottom: 20px;
    }
    /* Wordmark letter animation.
       Cycle = 5.4s: fade in 0.5s linear (0.1s stagger), hold visible 1s,
       fade out 1.8s cubic-bezier(.05,.25,.08,.99) (0.3s stagger), hold invisible 0.5s.
       Paths in markup are S, D, N, I, M (right-to-left), so :nth-child(5)
       targets M (first), :nth-child(1) targets S (last). */
    .wordmark path { opacity: 0; }
    /* Error state: freeze the animation and show every letter. */
    body.error .wordmark path {
      animation: none;
      opacity: 1;
    }
    .wordmark path:nth-child(5) { animation: fade-letter-0 5.4s infinite; }
    .wordmark path:nth-child(4) { animation: fade-letter-1 5.4s infinite; }
    .wordmark path:nth-child(3) { animation: fade-letter-2 5.4s infinite; }
    .wordmark path:nth-child(2) { animation: fade-letter-3 5.4s infinite; }
    .wordmark path:nth-child(1) { animation: fade-letter-4 5.4s infinite; }
    @keyframes fade-letter-0 {
      0%     { opacity: 0; animation-timing-function: linear; }
      9.26%  { opacity: 1; }
      35.19% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      68.52% { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes fade-letter-1 {
      0%     { opacity: 0; }
      1.85%  { opacity: 0; animation-timing-function: linear; }
      11.11% { opacity: 1; }
      40.74% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      74.07% { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes fade-letter-2 {
      0%     { opacity: 0; }
      3.70%  { opacity: 0; animation-timing-function: linear; }
      12.96% { opacity: 1; }
      46.30% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      79.63% { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes fade-letter-3 {
      0%     { opacity: 0; }
      5.56%  { opacity: 0; animation-timing-function: linear; }
      14.81% { opacity: 1; }
      51.85% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      85.19% { opacity: 0; }
      100%   { opacity: 0; }
    }
    @keyframes fade-letter-4 {
      0%     { opacity: 0; }
      7.41%  { opacity: 0; animation-timing-function: linear; }
      16.67% { opacity: 1; }
      57.41% { opacity: 1; animation-timing-function: cubic-bezier(.05, .25, .08, .99); }
      90.74% { opacity: 0; }
      100%   { opacity: 0; }
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #f8fafc;
    }
    /* Error state */
    #loading-status {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
      max-width: 80%;
      text-align: center;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 16px;
      user-select: text;
      -webkit-app-region: no-drag;
    }
    body.error #loading-status { display: none; }
    #error-view {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 32px;
    }
    #error-view h1 { margin-bottom: 12px; }
    .message {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      max-width: 400px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      -webkit-app-region: no-drag;
    }
    .actions button {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .toggle-details {
      background: none;
      border: none;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      margin-bottom: 12px;
      -webkit-app-region: no-drag;
    }
    .toggle-details:hover { color: #94a3b8; }
    .details {
      display: none;
      width: 100%;
      max-width: 600px;
      max-height: 200px;
      overflow: auto;
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 12px;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
      -webkit-app-region: no-drag;
      user-select: text;
    }
    .details.visible { display: block; }
  </style>
</head>
<body>

  </svg>
  <div id="loading-status"></div>
  <div id="error-view">
    <h1>Something went wrong</h1>
    <p class="message" id="error-message">Minds stopped unexpectedly.</p>
    <div class="actions">
      <button class="btn-primary" id="retry-btn">Retry</button>
      <button class="btn-secondary" id="log-btn">View full log</button>
    </div>
    <button class="toggle-details" id="toggle-details-btn">Show details</button>
    <pre class="details" id="error-details"></pre>
  </div>

  <script>
    var errorView = document.getElementById('error-view');

    document.getElementById('retry-btn').addEventListener('click', function() {
      if (window.minds) window.minds.retry();
    });
    document.getElementById('log-btn').addEventListener('click', function() {
      if (window.minds) window.minds.openLogFile();
    });
    document.getElementById('toggle-details-btn').addEventListener('click', function() {
      var el = document.getElementById('error-details');
      el.classList.toggle('visible');
      this.textContent = el.classList.contains('visible') ? 'Hide details' : 'Show details';
    });

    if (window.minds) {
      var loadingStatus = document.getElementById('loading-status');
      // Warm launches finish well under 20s; only reveal the status line
      // when the wordmark genuinely looks frozen.
      var latestStatus = '';
      var revealed = false;
      window.minds.onStatusUpdate(function(message) {
        latestStatus = message || '';
        if (revealed) loadingStatus.textContent = latestStatus;
      });
      setTimeout(function() {
        revealed = true;
        loadingStatus.textContent = latestStatus;
      }, 20000);
      window.minds.onErrorDetails(function(data) {
        document.body.classList.add('error');
        errorView.style.display = 'flex';
        if (data.message) document.getElementById('error-message').textContent = data.message;
        if (data.details) document.getElementById('error-details').textContent = data.details;
      });
    }
  </script>
</body>
</html>
