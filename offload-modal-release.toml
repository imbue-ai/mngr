# offload configuration for running mngr release tests on Modal
[offload]
max_parallel = 200
test_timeout_secs = 900
retry_count = 2
stream_output = true
sandbox_project_root = "/code/mngr"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile.release"

[provider.env]
PYTEST_MAX_DURATION_SECONDS = "900"

[provider.experimental_options]
enable_docker = true

[checkpoint]
build_inputs = [
    "libs/mngr/imbue/mngr/resources/Dockerfile",
    "libs/mngr/imbue/mngr/resources/Dockerfile.release.extras",
    "libs/mngr/imbue/mngr/resources/start-dockerd.sh",
    "pyproject.toml",
    "uv.lock",
]

[framework]
type = "pytest"
paths = ["."]
command = "uv run pytest"
run_args = "--no-cov -p no:xdist --timeout=900 -o addopts="

[groups.all]
retry_count = 4
# Run all release tests including docker (Docker-in-Docker enabled via
# Dockerfile.release + enable_docker). Retry flaky tests caused by
# intermittent Docker networking issues on gVisor.
filters = "-m 'release'"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**"]
