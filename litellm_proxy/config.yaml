# Local-dev litellm proxy config (consumed directly by the `litellm` CLI via
# litellm_proxy/start.sh). The model_list MUST stay in sync with
# apps/modal_litellm/app.py's LITELLM_CONFIG -- apps/modal_litellm/config_drift_test.py
# enforces this. Pricing is registered inline (mirrored from litellm's
# model_prices_and_context_window map) so cost tracking is correct even on
# litellm versions whose bundled price map predates a model.
model_list:
  # Current Opus line.
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000025
      cache_creation_input_token_cost: 0.00000625
      cache_read_input_token_cost: 0.0000005

  - model_name: claude-opus-4-7
