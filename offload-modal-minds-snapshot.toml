# offload configuration for the minds-snapshot-resume test suite.
#
# Unlike the other offload-modal*.toml configs, this one is not driven by
# offload's image-setup pipeline (Dockerfile build, post_patch_cmd, etc).
# Instead, the operator runs:
#
#     offload -c offload-modal-minds-snapshot.toml run \
#         --override-image-id <snapshot-image-id> ...
#
# where ``<snapshot-image-id>`` is the Modal image id printed by
# ``scripts/snapshot_minds_e2e_state.py``. That image already has the
# entire mngr checkout + DEFAULT_WORKSPACE_TEMPLATE workspace + a stopped Docker container
# baked in, so we skip the full image-setup phase and just boot
# sandboxes from the snapshot.
#
# ``--override-image-id`` was added in offload v0.9.6; the bump from
# 0.9.5 -> 0.9.6 in this PR is what enables this config to exist.

[offload]
# Must stay >= the number of minds_snapshot_resume tests: when batches
# exceed it, offload reuses sandboxes, and test_snapshot_resume's
# stopped-container-state check is order-dependent against the resume
# tests (a reused sandbox has the baked containers already started).
# 12 tests today; headroom for a few more.
max_parallel = 16
# The sync e2e lifecycle tests (test_sync_e2e.py) are the longest in this
# suite: each drives the real Electron app through workspace creation, a real
# backup, a full install wipe and a restore, and takes ~5 minutes. Their
# pytest marks (900s, func_only=false) sit below this ceiling so an overrun
# fails INSIDE pytest -- with junit and diagnostics -- instead of being killed
# here with nothing to show for it.
test_timeout_secs = 1200
stream_output = true
sandbox_project_root = "/code/mngr"

# No post_patch_cmd: the snapshot already has the synced venv + the
# committed-at-snapshot-time source tree. Each sandbox boots straight
# from the snapshot image and into the test command -- which is the
# whole point.

[provider]
type = "modal"
# Resource request per sandbox. offload's Modal default is only 128 MiB,
# which is fine for the trivial container-state checks but nowhere near
# enough to RESUME the workspace: a resumed sandbox runs dockerd, starts
# the DEFAULT_WORKSPACE_TEMPLATE workspace container, AND its nested docker-state (docker-in-
# docker) daemon. Without this the resume tests OOM and pytest is killed
# before it writes junit, which surfaces only as offload "failed to
# download junit.xml ... path does not exist". Match what
# scripts/snapshot_minds_e2e_state.py used to PRODUCE the image (cpu=4,
# memory=8GiB) so the resumed state has the same headroom it was built
# with.
cpu_cores = 4.0
memory_gb = 8
# vm_runtime must match what scripts/snapshot_minds_e2e_state.py used
# when *producing* the image -- the resumed sandbox's Docker-in-sandbox
# layer (/var/lib/docker) was written under a VM-runtime sandbox and
# needs the same runtime to be loaded back consistently. The image
# itself is supplied via --override-image-id on the offload CLI, so
# there's no dockerfile= here.
[provider.experimental_options]
vm_runtime = true

[framework]
type = "pytest"
# Scope discovery to exactly the files that carry the
# `minds_snapshot_resume` mark. Without this, offload's local
# `pytest --collect-only` collects the ENTIRE monorepo (~90s on the CI
# runner) just to find the ~12 marked tests; scoped paths bring that down
# to a few seconds. The mark is only ever applied in these two files, and
# scripts/snapshot_minds_e2e_state_test.py asserts this list stays in sync
# with reality -- if you add a snapshot-resume test in a new file, that
# test fails until you add the file here (otherwise the new test would
# silently never run in CI).
#
# Scoping has one subtlety: passing only paths under apps/minds makes
# pytest pick apps/minds as its rootdir (apps/minds/pyproject.toml has a
# pytest section), which would make the discovered test ids
# `test_snapshot_resume.py::...` instead of
# `apps/minds/test_snapshot_resume.py::...`. Those ids are passed VERBATIM
# as argv to pytest at execution time, where the cwd is the repo root
# (/code/mngr) -- so an unprefixed id would not resolve and every test
# would error. The `-c pyproject.toml` in the group filters below
# (discovery-only args) pins the root config so discovery emits
# repo-root-relative ids, exactly as unscoped discovery did.
paths = ["apps/minds/test_snapshot_resume.py", "apps/minds/test_sync_e2e.py"]
# Bash-wrapped command with a conditional cd so the same string works in
# both offload contexts:
# - Local discovery: offload's pytest framework `shell_words::split`s the
#   command, takes the first token as the program (`bash`), and spawns
#   it directly with the remaining tokens as argv. bash runs the -c
#   script: /code/mngr does not exist locally, so the cd is skipped,
#   and `uv run pytest --collect-only "$@"` runs from the worktree cwd.
# - In-sandbox execution: offload calls
#   `modal_sandbox.py exec <id> "<cmd.to_shell_string()>"`, which wraps
#   the whole thing in another `bash -c` inside the sandbox. The
#   sandbox's cwd is `/` (offload's create_from_image hardcodes
#   workdir=/app on Sandbox.create but Modal does NOT propagate that
#   workdir to subsequent .exec() calls). The inner bash -c sees
#   /code/mngr exists, cd's into it, then `uv run pytest "$@"` runs
#   from the project root and finds .venv/bin/pytest.
#
# The `--` after the inline script terminates bash's option parsing so
# the subsequent test args become "$@" rather than additional flags
# being parsed by bash.
command = "bash -c '[ -d /code/mngr ] && cd /code/mngr; exec uv run pytest \"$@\"' --"
run_args = "--no-cov -p no:xdist"

# Single group, no retries: a real failure should surface, not be masked
# by a retry. The suite currently has no @pytest.mark.flaky test.
#
# NOTE on retries: offload-modal.toml splits into `all`
# (`... and not flaky`, retry_count=0) and `flaky`
# (`... and flaky`, retry_count=N) groups so retries apply ONLY to
# flaky-marked tests. We deliberately do NOT replicate that split yet,
# because offload runs `pytest --collect-only` per group and a group
# that matches zero tests exits 5 ("no tests collected"), which offload
# treats as a discovery failure and fails the whole run. With no flaky
# snapshot test, a `flaky` group would always be empty and break CI.
# When the first @pytest.mark.flaky snapshot test is added, switch to the
# two-group split below (then the `flaky` group is non-empty and safe).
# Keep the `-c pyproject.toml` arg on BOTH groups' filters (see the
# [framework] paths comment above for why discovery needs it):
#     [groups.all]
#     retry_count = 0
#     filters = "-m 'minds_snapshot_resume and not flaky' -c pyproject.toml"
#     [groups.flaky]
#     retry_count = 4
#     filters = "-m 'minds_snapshot_resume and flaky' -c pyproject.toml"
[groups.all]
# Only tests carrying the snapshot-resume mark. Everything else is scoped
# out of this run (and `minds_snapshot_resume` is itself scoped out of the
# other offload configs, so a test with this mark is only ever collected
# here). `-c pyproject.toml` is a discovery-only arg (offload passes group
# filters only to `pytest --collect-only`, not to execution) that pins the
# repo-root pytest config so the scoped `paths` above still yield
# repo-root-relative test ids -- see the [framework] comment.
retry_count = 0
filters = "-m 'minds_snapshot_resume' -c pyproject.toml"

[history]
path = "offload-history-modal-minds-snapshot.jsonl"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**"]
