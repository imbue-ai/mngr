<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="color-scheme" content="dark" />
  <title>foreman · agent</title>
  <link rel="stylesheet" href="/static/foreman.css" />
</head>
<body>
  <div class="topbar">
    <a href="/" class="brand">‹ foreman</a>
    <span class="meta" id="agent-name"></span>
    <span class="spacer"></span>
    <a class="termlink" id="termlink" href="#">terminal ›</a>
    <span class="meta" id="conn">connecting…</span>
  </div>
  <div class="wrap">
    <div class="transcript" id="transcript"></div>
  </div>
  <div class="composer" id="composer" hidden>
    <div class="send-error" id="send-error" hidden></div>
    <div class="composer-blocked" id="composer-blocked" hidden>
      interactive prompt — <a id="blocked-termlink" href="#">open terminal ›</a>
    </div>
    <div class="upload-strip" id="upload-strip" hidden></div>
    <div class="inner" id="composer-inner">
      <button id="attach" class="attach-btn" title="Attach image or file" aria-label="Attach">+</button>
      <textarea id="input" rows="1" placeholder="message…" autocomplete="off"></textarea>
      <button id="send">send</button>
      <!-- Auto-scroll toggle: filled blue = following the tail; blue outline = detached
           (you scrolled up). Tap to resume at the bottom. Double chevron ⌄⌄. On desktop
           it floats bottom-right; on mobile it sits here in the bar, between send + Esc. -->
      <button id="autoscroll" class="autoscroll-btn on" title="Auto-scroll" aria-label="Toggle auto-scroll">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
             stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 5 12 11 18 5"></polyline>
          <polyline points="6 12 12 18 18 12"></polyline>
        </svg>
      </button>
      <button id="esc" class="esc-btn" title="Send Escape (stop generating)">Esc</button>
    </div>
    <input type="file" id="file-input" multiple hidden />
  </div>
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/app.js"></script>
  <script>foreman.initAgent();</script>
</body>
</html>
