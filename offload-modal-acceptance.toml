# offload configuration for running mng acceptance tests on Modal
[offload]
max_parallel = 100
test_timeout_secs = 60
retry_count = 2
stream_output = true
sandbox_project_root = "/code/mng"
sandbox_init_cmd = "git apply /offload-upload/patch --allow-empty && uv sync --all-packages"

[provider]
type = "modal"
dockerfile = "libs/mng/imbue/mng/resources/Dockerfile"

[framework]
type = "pytest"
paths = ["."]
command = "uv run pytest"
run_args = "--no-cov -p no:xdist -o addopts="

[groups.all]
retry_count = 0
# Exclude release tests from the acceptance suite. Exclude docker, modal, rsync, and unison tests
# because they require infrastructure not available inside Modal sandboxes.
# Also ignore modal provider tests that need Modal auth inside the sandbox.
filters = "-m'not release and not docker and not docker_sdk and not modal and not rsync and not unison' --ignore=libs/mng/imbue/mng/providers/modal"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
