# offload configuration for running mngr acceptance tests on Modal
[offload]
# With max_parallel > num_tests (~89), LPT degenerates to one-per-bin and
# every batch pays full pytest cold-start + sandbox-create + per-batch
# orchestrator-side `uv run` download overhead. 50 lets LPT pack 2-4
# tests/batch while load-balancing the slowest tests into their own bin.
max_parallel = 50
test_timeout_secs = 900
retry_count = 2
stream_output = true
sandbox_project_root = "/code/mngr"

# Run scripts/post-source-setup.sh after offload applies its thin diff
# to the cached checkpoint image. See offload-modal.toml for the full
# rationale.
post_patch_cmd = "bash scripts/post-source-setup.sh"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile"

[provider.experimental_options]
enable_docker = true

[checkpoint]
# pyproject.toml + uv.lock are here because Python deps are installed
# at image build time via `uv sync --all-packages` in the mngr Dockerfile.
# Per-package pyproject.toml files are also included: changes to per-package
# metadata (entry points, optional deps, build-system requires) make `uv run`
# in the sandbox consider editable installs stale and try to rebuild them,
# which fails because the sandbox runs with network disabled. Rebuilding the
# checkpoint image regenerates editable-install dist-info to match the new
# source so `uv run` finds nothing to rebuild.
# If dep churn starts invalidating the checkpoint too often, the
# alternative is to drop these from build_inputs and add a second
# `uv sync` call at sandbox startup (e.g. via offload's sandbox_init_cmd
# or the CMD) on top of the existing build-time one -- the Dockerfile
# RUN still provides the baseline install, and the startup sync picks
# up whatever drifted since the checkpoint. Trade-off is slower
# per-sandbox startup vs faster warm-cache hit rate.
build_inputs = [
    "libs/mngr/imbue/mngr/resources/Dockerfile",
    "pyproject.toml",
    "uv.lock",
    "libs/*/pyproject.toml",
    "apps/*/pyproject.toml",
]

[framework]
type = "pytest"
command = "uv run pytest"
run_args = "--no-cov -p no:xdist"

[groups.all]
retry_count = 1
# Exclude docker/docker_sdk tests -- they need a Docker daemon which Modal sandboxes don't have.
# Those tests run in a separate GitHub runner job (test-docker) until offload Docker-in-Docker support lands.
filters = "-m 'acceptance and not docker and not docker_sdk and not minds_deployment and not minds_services and not minds_snapshot_resume'"

[history]
path = "offload-history-modal-acceptance.jsonl"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**"]
