# offload configuration for running mngr acceptance tests on Modal
[offload]
max_parallel = 200
test_timeout_secs = 120
retry_count = 2
stream_output = true
sandbox_project_root = "/code/mngr"
# git add -A syncs the index after git apply, which only updates the working
# tree. Without it, git ls-files would still list files deleted by the patch.
sandbox_init_cmd = "git apply /offload-upload/patch --allow-empty && git add -A && uv sync --all-packages"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile"

[provider.experimental_options]
enable_docker = true

[framework]
type = "pytest"
paths = ["."]
command = "uv run pytest"
# `-o addopts=` is required here: when pytest auto-detects rootdir as a
# subpackage (e.g. libs/mngr/ when the test it's running lives there),
# that pyproject's addopts include `-m "not acceptance and not release"`,
# which deselects acceptance tests before our `-m 'acceptance and not
# docker and not docker_sdk'` filter below gets applied. Wiping addopts
# avoids the collision. Unlike offload-modal.toml (whose filter aligns
# with the default `-m`), acceptance's filter is the opposite.
run_args = "--no-cov -p no:xdist -o addopts="

[groups.all]
retry_count = 4
# Exclude docker/docker_sdk tests -- they need a Docker daemon which Modal sandboxes don't have.
# Those tests run in a separate GitHub runner job (test-docker) until offload Docker-in-Docker support lands.
filters = "-m 'acceptance and not docker and not docker_sdk'"
# When flaky tests exist, add a [groups.flaky] section:
# [groups.flaky]
# retry_count = 5
# filters = "-m 'flaky and acceptance and not docker and not docker_sdk'"
# and add 'and not flaky' to the groups.all filter above.

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**"]
