name: minds launch-to-first-message

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'mngr commit to verify: full 40-char SHA, branch, or tag. Empty -> mngr main HEAD at trigger time (matches the scheduled-cron behavior). Frozen to a SHA at run start (check_should_run); every downstream job uses the frozen SHA, so commits pushed to the ref mid-run are not picked up. The build job reuses an existing ToDesktop build for the frozen SHA when one exists; verify always consumes a bundle built from this SHA.'
        required: false
        default: ''
      skip_slack_flow:
        description: 'Skip the slack-permission-flow Playwright step.'
        type: boolean
        required: false
        default: false
      template_ref:
        description: "default-workspace-template commit the agent is created from: full 40-char SHA, branch, or tag. Empty -> `main`. Frozen to a SHA at run start, so the run is immune to the ref moving mid-run. A SHA must be reachable from some ref in the DEFAULT_WORKSPACE_TEMPLATE repo. Runtime behavior is a function of (minds binary, default workspace template); pin both for reproducible replays. SHA creates need a binary built from mngr 02bb71b44 (2026-06-11) or later."
        required: false
        default: ''
      template_url:
        description: 'Override the DEFAULT_WORKSPACE_TEMPLATE git URL (forks). Empty -> https://github.com/imbue-ai/default-workspace-template.'
        required: false
        default: ''
      force:
        description: 'Bypass the skip-if-unchanged check. Schedule-triggered runs skip when the (mngr main HEAD, DEFAULT_WORKSPACE_TEMPLATE main HEAD) pair matches the last green run; dispatch-triggered runs ignore the check entirely.'
        type: boolean
        required: false
        default: false
  # Twice-daily health check against both repos' main HEADs. Schedules only
  # fire from the default branch. `check_should_run` skips the expensive
  # jobs when the (mngr, DEFAULT_WORKSPACE_TEMPLATE) pair is unchanged since the last green run,
  # so the "nothing changed" cost is one free Linux job.
  schedule:
    - cron: '0 16 * * *'  # 09:00 PDT / 08:00 PST
    - cron: '0 4 * * *'   # 21:00 PDT / 20:00 PST

concurrency:
  group: mac-runner
  cancel-in-progress: false

# `actions: read` lets notify_slack fetch the run's `run_started_at` for the
# duration field. actions/cache uses its own injected token, so no write scope.
# `id-token: write` lets the use-vault-secrets steps (in `build`,
# `launch_to_msg`, and `notify_slack`) mint a GitHub OIDC token for Vault.
permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  # Free Linux job with two roles. (1) Freeze point: resolves the mngr and
  # DEFAULT_WORKSPACE_TEMPLATE inputs (branch / tag / SHA) to full SHAs exactly once; downstream
  # jobs consume the `mngr_sha` / `default_workspace_template_sha` outputs, never the raw inputs,
  # so a moving ref like `main` cannot drift mid-run. (2) Skip decision: an
  # actions/cache entry keyed by the frozen pair means the last green run
  # already verified it, so the expensive jobs are skipped (`lookup-only`
  # -- no download).
  check_should_run:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      pair_key:   ${{ steps.compute.outputs.pair_key }}
      mngr_sha:   ${{ steps.compute.outputs.mngr_sha }}
      default_workspace_template_sha:    ${{ steps.compute.outputs.default_workspace_template_sha }}
      mngr_ref:   ${{ steps.compute.outputs.mngr_ref }}
      default_workspace_template_ref:    ${{ steps.compute.outputs.default_workspace_template_ref }}
    steps:
      - name: compute (mngr, DEFAULT_WORKSPACE_TEMPLATE) pair key
        id: compute
        run: |
          set -euo pipefail
          # Resolve a branch / tag / full-SHA ref to a commit SHA. Peels
          # annotated tags (`^{}`) to the commit they point at -- else the
          # slack/summary would show a tag-object SHA nobody can checkout.
          resolve_ref() {
            local url="$1" ref="$2" sha=""
            if [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              echo "$ref"
              return
            fi
            sha=$(git ls-remote "$url" "refs/tags/$ref^{}" | awk '{print $1; exit}')
            [[ -z "$sha" ]] && sha=$(git ls-remote "$url" "refs/heads/$ref" "refs/tags/$ref" | awk '{print $1; exit}')
            echo "$sha"
          }
          # Empty commit_sha -> the trigger commit (for schedule, the default
          # branch HEAD), labeled with the trigger branch so slack/summaries
          # show `main (<sha>)` rather than a bare SHA.
          MNGR_REF='${{ inputs.commit_sha }}'
          if [[ -z "$MNGR_REF" ]]; then
            MNGR_REF='${{ github.ref_name }}'
            MNGR_SHA='${{ github.sha }}'
          else
            MNGR_SHA=$(resolve_ref 'https://github.com/${{ github.repository }}.git' "$MNGR_REF")
          fi
          DEFAULT_WORKSPACE_TEMPLATE_REF='${{ inputs.template_ref }}'
          [[ -z "$DEFAULT_WORKSPACE_TEMPLATE_REF" ]] && DEFAULT_WORKSPACE_TEMPLATE_REF='main'
          DEFAULT_WORKSPACE_TEMPLATE_REPO_URL='${{ inputs.template_url }}'
          [[ -z "$DEFAULT_WORKSPACE_TEMPLATE_REPO_URL" ]] && DEFAULT_WORKSPACE_TEMPLATE_REPO_URL='https://github.com/imbue-ai/default-workspace-template'
          DEFAULT_WORKSPACE_TEMPLATE_SHA=$(resolve_ref "$DEFAULT_WORKSPACE_TEMPLATE_REPO_URL" "$DEFAULT_WORKSPACE_TEMPLATE_REF")
          if [[ -z "$MNGR_SHA" || -z "$DEFAULT_WORKSPACE_TEMPLATE_SHA" ]]; then
            echo "::error::failed to resolve refs -- MNGR_SHA='$MNGR_SHA' DEFAULT_WORKSPACE_TEMPLATE_SHA='$DEFAULT_WORKSPACE_TEMPLATE_SHA'"
            exit 1
          fi
          PAIR_KEY=$(printf '%s:%s' "$MNGR_SHA" "$DEFAULT_WORKSPACE_TEMPLATE_SHA" | shasum -a 256 | awk '{print $1}')
          {
            echo "mngr_sha=$MNGR_SHA"
            echo "default_workspace_template_sha=$DEFAULT_WORKSPACE_TEMPLATE_SHA"
            echo "mngr_ref=$MNGR_REF"
            echo "default_workspace_template_ref=$DEFAULT_WORKSPACE_TEMPLATE_REF"
            echo "pair_key=$PAIR_KEY"
          } >> "$GITHUB_OUTPUT"
      - name: look up marker cache
        id: marker
        uses: actions/cache/restore@v4
        with:
          # Path is required by the action even with lookup-only; the
          # file never has to exist locally because we're not restoring.
          path: /tmp/launch-to-msg-marker.txt
          # Embed both SHAs directly in the key so `gh cache list`
          # reveals the green pair without having to download the cache.
          key: launch-to-msg-green-mngr-${{ steps.compute.outputs.mngr_sha }}-default-workspace-template-${{ steps.compute.outputs.default_workspace_template_sha }}
          lookup-only: true
      - name: decide
        id: decide
        run: |
          set -euo pipefail
          {
            echo "## Pair-key fingerprint"
            echo "- mngr: \`${{ steps.compute.outputs.mngr_ref }}\` (\`${{ steps.compute.outputs.mngr_sha }}\`)"
            echo "- DEFAULT_WORKSPACE_TEMPLATE:  \`${{ steps.compute.outputs.default_workspace_template_ref }}\` (\`${{ steps.compute.outputs.default_workspace_template_sha }}\`)"
            echo "- cache key: \`launch-to-msg-green-mngr-${{ steps.compute.outputs.mngr_sha }}-default-workspace-template-${{ steps.compute.outputs.default_workspace_template_sha }}\`"
            echo "- marker cache-hit: \`${{ steps.marker.outputs.cache-hit }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          # Skip when the pair is already green unless force=true. Applies
          # to both schedule and dispatch.
          if [[ '${{ steps.marker.outputs.cache-hit }}' == 'true' \
             && '${{ inputs.force }}' != 'true' ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "- decision: **skip** (pair already green; set force=true to bypass)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "- decision: **run**" >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    needs: [check_should_run]
    if: needs.check_should_run.outputs.should_run == 'true'
    # Gated behind the `minds-release` GitHub Environment: the minds_release_gh
    # Vault role that mints the ToDesktop credentials binds on this environment
    # claim, so only a job that declares it can fetch them. The environment must
    # exist in the repo settings with NO required reviewers, so the nightly
    # build still runs unattended.
    environment: minds-release
    # Reuses an existing clean ToDesktop build for the frozen SHA when one
    # exists (skips the ~15-min sign + notarize); otherwise packages fresh.
    # Verify always consumes this job's output, never a released bundle.
    # MUST be macOS: scripts/download-binaries.js uses `xcrun --find git`
    # for the darwin git bundle, and bundling uv/lima needs native arm64
    # binaries.
    runs-on: [self-hosted, macOS, minds-runner]
    # 85 min = the 70-min `pnpm dist` step budget (below) + ~15 min for the
    # post-failure cancel step to tear an orphaned ToDesktop build down.
    timeout-minutes: 85
    env:
      # Resolved relative to pnpm's CWD (apps/minds), not the repo root.
      # TEST BUILD ONLY (DO NOT MERGE): build against the dev environment, so the
      # pre-baked Lima image path can be proven end to end without creating agents
      # or hosts in production. Restore production/client.toml + minds before merge.
      MINDS_CLIENT_CONFIG_BUNDLE: imbue/minds/config/envs/dev-weishi/client.toml
      MINDS_ROOT_NAME_BUNDLE: minds-dev-weishi
    outputs:
      app_zip_url: ${{ steps.existing.outputs.url || steps.parse.outputs.url }}
      build_id:    ${{ steps.existing.outputs.build_id || steps.parse.outputs.build_id }}
      reused:      ${{ steps.existing.outputs.url != '' }}
    steps:
      # ToDesktop signing/publishing credentials from Vault (migrated off the
      # TODESKTOP_ACCESS_TOKEN / TODESKTOP_EMAIL GitHub Actions secrets). These
      # publish the minds desktop client, so they live under minds/release/*
      # behind the minds_release_gh role's environment gate, not the ordinary CI
      # role. NOTE: this self-hosted macOS runner must have curl + jq on PATH,
      # which the use-vault-secrets action shells out to.
      - name: Fetch ToDesktop credentials from Vault
        uses: imbue-ai/use-vault-secrets@main
        with:
          role: minds_release_gh
          secrets: |
            minds/release/TODESKTOP_ACCESS_TOKEN
            minds/release/TODESKTOP_EMAIL
      - name: check ToDesktop secrets
        run: |
          missing=0
          for var in TODESKTOP_ACCESS_TOKEN TODESKTOP_EMAIL; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::$var secret is not set. Add it to Vault under secrets/minds/release/ (see the use-vault-secrets step above)."
              missing=1
            fi
          done
          if (( missing )); then
            exit 1
          fi
          echo "TODESKTOP_ACCESS_TOKEN length=${#TODESKTOP_ACCESS_TOKEN}, TODESKTOP_EMAIL length=${#TODESKTOP_EMAIL}"
      # Checkout the frozen SHA, not the raw input: a branch input was
      # resolved once in check_should_run, so a push to it mid-run can't
      # change what gets built.
      - name: checkout @ ${{ needs.check_should_run.outputs.mngr_sha }}
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.check_should_run.outputs.mngr_sha }}
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
      - name: setup pnpm
        run: |
          npm install -g pnpm@10.33.4
          pnpm --version
      - name: setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
      - name: pnpm install
        working-directory: apps/minds
        run: pnpm install --frozen-lockfile
      - name: read ToDesktop APP_ID from todesktop.js
        working-directory: apps/minds
        run: |
          APP_ID=$(node -e "console.log(require('./todesktop.js').id)")
          echo "APP_ID=$APP_ID" >> "$GITHUB_ENV"
      - name: check for existing ToDesktop build matching this commit
        id: existing
        working-directory: apps/minds
        env:
          TARGET_SHA: ${{ needs.check_should_run.outputs.mngr_sha }}
        run: |
          set -o pipefail
          # `todesktop builds --format json` reports versionControlInfo.commitId
          # per build; a clean succeeded build for this SHA lets us reuse its
          # arm64 .zip URL and skip pnpm dist.
          mkdir -p resources  # todesktop config validation requires extraResources dir
          # The CLI emits ANSI cursor-control escapes to stdout before the JSON
          # payload -- strip them or the JSON is unparseable. Stderr (CLI
          # version banner) goes to a separate file.
          pnpm exec todesktop builds --format json --count 30 --exit 2>/tmp/td-builds.err \
            | perl -pe 's/\x1b\[[0-9;]*[a-zA-Z]//g' > /tmp/td-builds.json
          # Python emits the diagnostics + the chosen <url>\t<build_id> pair
          # to stdout in a single deterministic format the shell parses below.
          MATCH=$(python3 -c '
          import json, os, sys
          builds = json.load(open("/tmp/td-builds.json"))
          if not isinstance(builds, list):
              print(f"FATAL: unexpected response shape: {type(builds).__name__}", file=sys.stderr)
              sys.exit(1)
          target = os.environ["TARGET_SHA"]
          sha_hits = [b for b in builds if (b.get("versionControlInfo") or {}).get("commitId") == target]
          print(f"scanned {len(builds)} builds; {len(sha_hits)} match {target[:10]}", file=sys.stderr)
          for b in sha_hits:
              vci = b.get("versionControlInfo") or {}
              status = b.get("status")
              dirty = vci.get("hasUncommittedChanges")
              # The arm64 .zip URL moved across CLI versions; check both layouts.
              mac = b.get("mac") or {}
              zip_node = (mac.get("artifactDownloads") or {}).get("zip") or mac.get("zip") or {}
              arm = zip_node.get("arm64") if isinstance(zip_node, dict) else None
              url = arm.get("url") if isinstance(arm, dict) else None
              # standardUniversalDownloadUrl ends in the human-readable build id
              # the dashboard shows; the bare "id" field is a UUID.
              bid = (b.get("standardUniversalDownloadUrl") or "").rstrip("/").split("/")[-1] or b.get("id", "")
              print(f"  candidate {bid}: status={status} dirty={dirty} arm64.url={bool(url)}", file=sys.stderr)
              if status not in ("succeeded", "ready"): continue
              if dirty:                                 continue
              if not url:                               continue
              print(f"{url}\t{bid}")
              sys.exit(0)
          ')
          if [[ -n "$MATCH" ]]; then
            URL="${MATCH%%$'\t'*}"
            BID="${MATCH##*$'\t'}"
            echo "url=$URL"      >> "$GITHUB_OUTPUT"
            echo "build_id=$BID" >> "$GITHUB_OUTPUT"
            echo "Reusing existing build $BID for commit $TARGET_SHA"
            echo "  -> $URL"
          else
            echo "No reusable build matches $TARGET_SHA; will build fresh."
          fi
      - name: pnpm dist (build + upload to ToDesktop)
        id: dist
        if: steps.existing.outputs.url == ''
        # A fresh dual-arch build runs ~43 min, longer when ToDesktop's
        # source-download step stalls; notarization is the long pole.
        timeout-minutes: 70
        working-directory: apps/minds
        # build.js::bundleLatchkey smoke-tests the bundled CLI, which needs
        # an encryption key; the headless runner's keychain is locked, so
        # provide a throwaway. The shipped .app uses the end user's keychain.
        env:
          LATCHKEY_ENCRYPTION_KEY: ci-throwaway-build-smoketest-key-not-used-at-runtime
        run: |
          set -o pipefail
          # ToDesktop's cloud builder fetches uv/restic/etc from GitHub's
          # release CDN at sign time; transient 504s happen, so retry up to
          # 3 times rather than waste a 20-min build slot.
          attempt=1
          max_attempts=3
          while true; do
            if pnpm dist 2>&1 | tee /tmp/minds-dist.log; then
              break
            fi
            if [[ $attempt -ge $max_attempts ]]; then
              echo "::error::pnpm dist failed after $max_attempts attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            echo "::warning::pnpm dist failed (attempt $((attempt - 1)) of $max_attempts); retrying in 30s"
            sleep 30
          done
      - name: parse build URL
        id: parse
        if: steps.existing.outputs.url == ''
        run: |
          # ToDesktop prints "Retrieved build ID: <id>" early in the upload
          # step. Construct the arm64 .zip URL from it — pnpm dist's final
          # "Build complete!" line is the dashboard URL, not a direct artifact.
          BUILD_ID=$(grep -oE 'Retrieved build ID: [a-z0-9]+' /tmp/minds-dist.log 2>/dev/null | awk '{print $NF}' | tail -1 || true)
          if [[ -z "$BUILD_ID" ]]; then
            echo "::error::could not extract build ID from /tmp/minds-dist.log. Check the uploaded build-log artifact."
            exit 1
          fi
          URL="https://dl.todesktop.com/${APP_ID}/builds/${BUILD_ID}/mac/zip/arm64"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "url=$URL"           >> "$GITHUB_OUTPUT"
      - name: emit build summary
        if: always()
        run: |
          if [[ -n "${{ steps.existing.outputs.url }}" ]]; then
            URL='${{ steps.existing.outputs.url }}'
            BID='${{ steps.existing.outputs.build_id }}'
            SRC='reused (no rebuild needed)'
          else
            URL='${{ steps.parse.outputs.url }}'
            BID='${{ steps.parse.outputs.build_id }}'
            SRC='freshly built'
          fi
          {
            echo "## Build result ($SRC)"
            echo ""
            echo "- commit: \`${{ needs.check_should_run.outputs.mngr_ref }}\` (frozen \`${{ needs.check_should_run.outputs.mngr_sha }}\`)"
            echo "- build_id: \`${BID:-<none>}\`"
            echo "- url: ${URL:-<none>}"
            echo "- dashboard: https://app.todesktop.com/apps/${APP_ID}/builds/${BID}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: cancel ToDesktop build if workflow cancelled or build job failed
        # The build id only exists once the upload step logged it to
        # /tmp/minds-dist.log; a pre-upload failure has nothing to cancel.
        if: ${{ always() && (cancelled() || failure()) && steps.existing.outputs.url == '' }}
        run: |
          BUILD_ID=$(grep -oE 'Retrieved build ID: [a-z0-9]+' /tmp/minds-dist.log 2>/dev/null | awk '{print $NF}' | tail -1 || true)
          if [[ -z "$BUILD_ID" ]]; then
            echo "no build ID in /tmp/minds-dist.log -- ToDesktop upload didn't happen, nothing to cancel"
            exit 0
          fi
          echo "cancelling orphaned ToDesktop build $BUILD_ID"
          bash apps/minds/scripts/cancel-todesktop-build.sh "$APP_ID" "$BUILD_ID" || {
            echo "::warning::cancel-todesktop-build.sh failed (build may have already completed/failed); see logs"
            exit 0
          }
      - name: upload build log
        if: always() && steps.existing.outputs.url == ''
        uses: actions/upload-artifact@v7
        with:
          name: minds-dist-log-${{ github.run_id }}
          path: /tmp/minds-dist.log
          retention-days: 7
          if-no-files-found: ignore

  launch_to_msg:
    needs: [check_should_run, build]
    if: needs.check_should_run.outputs.should_run == 'true' && needs.build.result == 'success'
    runs-on: [self-hosted, macOS, minds-runner]
    timeout-minutes: 40
    outputs:
      # Per-run metrics for the slack message. The e2e prints `[ci-metric]
      # <key>=<float>` lines as each value lands; `extract ci-metrics` greps
      # whichever were captured, so a partial failure still surfaces a prefix.
      launch_to_ready: ${{ steps.timings.outputs.launch_to_ready }}
      w1_create:       ${{ steps.timings.outputs.w1_create }}
      w2_create:       ${{ steps.timings.outputs.w2_create }}
    steps:
      # Anthropic key from Vault (migrated off the ANTHROPIC_API_KEY GitHub
      # Actions secret). This self-hosted macOS runner must have curl + jq on
      # PATH, which the use-vault-secrets action shells out to.
      - name: Fetch Anthropic key from Vault
        uses: imbue-ai/use-vault-secrets@main
        with:
          role: mngr_ci_gh
          secrets: |
            mngr/ci/ANTHROPIC_API_KEY
      - uses: actions/checkout@v6
      - name: verify ANTHROPIC_API_KEY injected
        run: |
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "ANTHROPIC_API_KEY is empty — secret not reaching the runner"; exit 1
          fi
          echo "ANTHROPIC_API_KEY present, length=${#ANTHROPIC_API_KEY}"
      - name: setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
      - name: setup Python via uv
        run: uv python install 3.12
      - name: install minds workspace + playwright python
        run: |
          uv sync --package minds --frozen
          uv run --package minds python -c "from playwright.async_api import async_playwright; print('playwright imports OK')"
      - name: resolve build URL
        id: url
        run: |
          # The build job's output is the only bundle source -- deliberately
          # no fallback to released bundles, which would test infra, not code.
          URL='${{ needs.build.outputs.app_zip_url }}'
          REUSED='${{ needs.build.outputs.reused }}'
          if [[ -z "$URL" ]]; then
            echo "::error::build job did not produce a bundle URL. Inspect minds-dist-log-${{ github.run_id }}."
            exit 1
          fi
          if [[ "$REUSED" == "true" ]]; then
            SRC='reused build (commit ${{ needs.check_should_run.outputs.mngr_sha }}, build_id ${{ needs.build.outputs.build_id }})'
          else
            SRC='fresh build (commit ${{ needs.check_should_run.outputs.mngr_sha }}, build_id ${{ needs.build.outputs.build_id }})'
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Verifying: $URL"
          echo "Source: $SRC"
          {
            echo "## Verifying"
            echo ""
            echo "- URL: $URL"
            echo "- Source: $SRC"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: precheck runner disk space (need >=200GB free for Lima diffdisks)
        # Lima allocates up to 100GB per VM as a sparse diffdisk and the run
        # boots two VMs (W1 + W2); failing here is a fast, actionable error
        # instead of "no space left on device" 15 min into the test.
        run: |
          AVAIL_KB=$(df -k "$HOME" | awk 'NR==2 {print $4}')
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          echo "Available on $HOME: ${AVAIL_GB}GB"
          df -h "$HOME" /
          if [[ "$AVAIL_GB" -lt 200 ]]; then
            echo "::error::runner disk has only ${AVAIL_GB}GB free; Lima diffdisks need ~100GB each. Free space (ToDesktop builds in ~/actions-runner/_work, npm/uv caches, etc.) before retrying."
            exit 1
          fi

      - name: TEST BUILD ONLY (DO NOT MERGE) -- drop the stale dev data root
        # mac-runner-reset.sh only ever wipes ~/.minds, so this test build's root
        # (~/.minds-dev-weishi) survives every run, cached Lima image included. The
        # fixed image was republished under the same version, and the client
        # short-circuits on version+arch alone (lima_image/ensure.py), so without
        # this the runner would keep booting the stale, unbootable copy.
        run: rm -rf "$HOME/.minds-dev-weishi"

      - name: reset to clean state and install fresh app
        run: bash apps/minds/scripts/mac-runner-reset.sh "${{ steps.url.outputs.url }}"

      - name: seed lima image-cache sha256.digest marker
        # Without the marker, lima 2.0.3 HEAD-validates the image source URL
        # on every boot; when the mirror is unreachable it logs "Using cache"
        # but skips materializing basedisk and fatals. With the marker it
        # trusts the cached data and boots offline.
        run: |
          set +e
          CACHE_ROOT="$HOME/Library/Caches/lima/download/by-url-sha256"
          for CACHE_DIR in "$CACHE_ROOT"/*/; do
            [ -d "$CACHE_DIR" ] || continue
            DATA="$CACHE_DIR/data"
            DIGEST_FILE="$CACHE_DIR/sha256.digest"
            [ -f "$DATA" ] || continue
            [ -f "$DIGEST_FILE" ] && continue  # already present
            HASH=$(shasum -a 256 "$DATA" | awk '{print $1}')
            [ -n "$HASH" ] || continue
            echo "sha256:$HASH" > "$DIGEST_FILE"
            echo "seeded $DIGEST_FILE -> sha256:$HASH"
          done
          true

      - name: probe debian-image reachability + lima cache state
        # Diagnostics for recurring cloud.debian.org unreachability from this
        # runner: DNS / HEAD / GET / TCP across mirrors plus lima cache state,
        # so an image-download boot failure is attributable. Never fails.
        run: |
          set +e
          IMG="debian-12-genericcloud-arm64-20260601-2496.qcow2"
          echo "=== DNS resolution:"
          for HOST in cloud.debian.org cdimage.debian.org saimei.ftp.acc.umu.se mirrors.kernel.org cdn-fastly.deb.debian.org; do
            printf "  %-40s -> " "$HOST"
            dig +short +tries=1 +time=3 "$HOST" 2>&1 | head -1 || echo "(dig fail)"
          done
          echo
          echo "=== HEAD + first-byte GET attempts (30s timeout each):"
          for URL in \
            "https://cloud.debian.org/images/cloud/bookworm/20260601-2496/$IMG" \
            "https://cdimage.debian.org/cdimage/cloud/bookworm/20260601-2496/$IMG" \
            "https://saimei.ftp.acc.umu.se/cloud-images/cloud/bookworm/20260601-2496/$IMG" \
            "https://mirrors.kernel.org/debian-cloud-images/bookworm/20260601-2496/$IMG" \
            "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"; do
            echo "--- $URL"
            HEAD_OUT=$(/opt/homebrew/opt/curl/bin/curl --max-time 30 -sSI "$URL" 2>&1)
            HEAD_RC=$?
            echo "    HEAD rc=$HEAD_RC: $(echo "$HEAD_OUT" | head -1)"
            if [[ "$HEAD_RC" -eq 0 ]]; then
              # Try to fetch the first 100KB to verify the data path actually works.
              GET_OUT=$(/opt/homebrew/opt/curl/bin/curl --max-time 30 -sS -o /tmp/probe-body -w "%{http_code} %{size_download}b in %{time_total}s\n" -H "Range: bytes=0-102399" "$URL" 2>&1)
              echo "    GET rc=$? : $GET_OUT"
              rm -f /tmp/probe-body
            fi
          done
          echo
          echo "=== plain TCP connectivity (nc -z, 5s timeout):"
          for HP in cloud.debian.org:443 cdimage.debian.org:443 mirrors.kernel.org:443 github.com:443; do
            HOST="${HP%%:*}"; PORT="${HP##*:}"
            printf "  %-40s : " "$HP"
            nc -z -G 5 -w 5 "$HOST" "$PORT" 2>&1 && echo "open" || echo "closed/timeout"
          done
          echo
          echo "=== lima cache state for the Debian URL:"
          CACHE_DIR="$HOME/Library/Caches/lima/download/by-url-sha256/8774030760d00b6458319cdbb37dce5d0a878cde994448674bd9f3e6eca6e761"
          if [[ -d "$CACHE_DIR" ]]; then
            ls -la "$CACHE_DIR"
            if [[ -f "$CACHE_DIR/data" ]]; then
              file "$CACHE_DIR/data" | head -1
              stat -f 'size=%z' "$CACHE_DIR/data"
            fi
          else
            echo "(cache dir absent)"
          fi
          echo
          echo "=== installed lima version (bundled):"
          /Applications/Minds.app/Contents/Resources/lima/bin/limactl --version 2>&1 || true
          true  # never fail the step itself

      - name: ensure socat (slack mock TLS terminator)
        run: |
          for BREW in /opt/homebrew/bin/brew /usr/local/bin/brew; do
            [[ -x "$BREW" ]] && export PATH="$(dirname "$BREW"):$PATH" && break
          done
          if ! command -v socat >/dev/null; then
            brew install socat
          fi
          (socat -V 2>&1 || true) | head -1 || true
          for D in /opt/homebrew/bin /usr/local/bin; do
            if [[ -d "$D" ]]; then echo "$D" >> "$GITHUB_PATH"; fi
          done

      - name: install Google Chrome + prime latchkey browser config
        # latchkey ensure-browser tries: existing-config, system-browser,
        # then two playwright sources that need playwright-core internals the
        # bundled .app doesn't ship. Installing Chrome makes system-browser
        # win, so the agent's chat panel can complete the Slack OAuth
        # round-trip.
        run: |
          set -euo pipefail
          for BREW in /opt/homebrew/bin/brew /usr/local/bin/brew; do
            [[ -x "$BREW" ]] && export PATH="$(dirname "$BREW"):$PATH" && break
          done
          if [[ ! -d /Applications/Google\ Chrome.app ]]; then
            brew install --cask google-chrome
          fi
          # Sanity check + write browser.json so future runs hit
          # existing-config and skip the system-browser probe.
          MINDS_ELECTRON_EXEC_PATH=/Applications/Minds.app/Contents/MacOS/Minds \
            /Applications/Minds.app/Contents/Resources/latchkey/bin/latchkey ensure-browser

      - name: report frozen default workspace template pin
        # Echo the SHA frozen in check_should_run so this job's log + summary
        # name the exact DEFAULT_WORKSPACE_TEMPLATE commit. Deliberately not re-resolved --
        # re-resolving after the build is the drift window the freeze closes.
        env:
          DEFAULT_WORKSPACE_TEMPLATE_REPO_URL: ${{ inputs.template_url || 'https://github.com/imbue-ai/default-workspace-template' }}
          DEFAULT_WORKSPACE_TEMPLATE_REF:      ${{ needs.check_should_run.outputs.default_workspace_template_ref }}
          DEFAULT_WORKSPACE_TEMPLATE_SHA:      ${{ needs.check_should_run.outputs.default_workspace_template_sha }}
        run: |
          set -euo pipefail
          {
            echo "## default workspace template"
            echo ""
            echo "- repo: \`$DEFAULT_WORKSPACE_TEMPLATE_REPO_URL\`"
            echo "- ref input: \`$DEFAULT_WORKSPACE_TEMPLATE_REF\`"
            echo "- frozen SHA: \`$DEFAULT_WORKSPACE_TEMPLATE_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "DEFAULT_WORKSPACE_TEMPLATE $DEFAULT_WORKSPACE_TEMPLATE_REPO_URL @ $DEFAULT_WORKSPACE_TEMPLATE_REF frozen at $DEFAULT_WORKSPACE_TEMPLATE_SHA"

      - name: launch-to-msg + slack flow (Python)
        env:
          SKIP_SLACK_FLOW:    ${{ inputs.skip_slack_flow && '1' || '0' }}
          # Drive a second workspace + cross-workspace follow-up pings in the
          # same run.
          WORKSPACE_COUNT:    "2"
          # TEST BUILD ONLY (DO NOT MERGE): the usual pin sets
          # MINDS_USE_LOCAL_WORKSPACE_DEFAULTS=1, which IS the dev-loop signal, and the
          # pre-baked-image gate disables itself in the dev loop
          # (should_use_prebaked_lima_image: if is_dev_loop -> False). With it set, this
          # run builds the toolchain in-VM and proves nothing about the fast path -- it
          # goes green having tested the slow path. Drop the pin so the app uses its own
          # defaults, exactly as a real user does: the default repo at FALLBACK_BRANCH.
        run: |
          # pipefail is REQUIRED: without it the pipeline exits with tee's
          # status (always 0) and a failing e2e is reported green.
          set -o pipefail
          # Tee to a file so the e2e's structured output survives in the
          # artifact; GHA's own console log expires.
          mkdir -p /tmp/launch-to-msg-logs
          uv run --package minds python apps/minds/scripts/launch_to_msg_e2e.py 2>&1 \
            | tee /tmp/launch-to-msg-logs/e2e-stdout.log

      - name: extract ci-metrics
        id: timings
        if: always()
        # Grep the `[ci-metric] <key>=<float>` lines out of the tee'd e2e
        # log; a partial run still yields whichever metrics landed.
        run: |
          log=/tmp/launch-to-msg-logs/e2e-stdout.log
          for k in launch_to_ready_s w1_create_s w2_create_s; do
            v=$(grep -oE "${k}=[0-9.]+" "$log" 2>/dev/null | tail -1 | cut -d= -f2 || true)
            echo "${k%_s}=${v:-}" >> "$GITHUB_OUTPUT"
          done

      - name: probe agent VM + container state on failure
        if: failure()
        # When the e2e fails after agent creation reached DONE (e.g. chat-URL
        # recovery loop didn't resolve), we need to know why mngr_forward
        # can't reach the agent's system_interface. Probe the lima VM and the
        # docker container inside it for service / network state.
        run: |
          set +e
          LIMA=/Applications/Minds.app/Contents/Resources/lima/bin/limactl
          mkdir -p /tmp/launch-to-msg-logs
          {
            echo "=== limactl list ==="
            "$LIMA" list 2>&1
            VM=$("$LIMA" list -q 2>/dev/null | head -1)
            if [ -z "$VM" ]; then
              echo "(no lima VM)"
              exit 0
            fi
            echo
            echo "=== VM: $VM ==="
            echo "=== docker ps inside VM ==="
            "$LIMA" shell "$VM" -- sudo docker ps -a 2>&1 | head -20
            CID=$("$LIMA" shell "$VM" -- sudo docker ps -q 2>/dev/null | head -1)
            if [ -z "$CID" ]; then
              echo "(no docker container -- pilot in-VM provisioning path)"
              echo
              echo "=== tmux sessions inside VM (root socket) ==="
              "$LIMA" shell "$VM" -- sudo tmux -S /tmp/tmux-0/default list-sessions 2>&1 | head -10
              echo
              for win in $("$LIMA" shell "$VM" -- sudo tmux -S /tmp/tmux-0/default list-windows -t minds-system-services -F '#{window_name}' 2>/dev/null); do
                echo "--- tmux capture-pane minds-system-services:$win ---"
                "$LIMA" shell "$VM" -- sudo tmux -S /tmp/tmux-0/default capture-pane -t "minds-system-services:$win" -p -S -300 2>&1 | tail -40
                echo
              done
              echo "=== TEST: directly invoke installed CLIs as root (replicates SIGILL trigger) ==="
              "$LIMA" shell "$VM" -- sudo bash -c '
                echo "--- which mngr / system-interface ---"
                which mngr system-interface 2>&1
                echo "--- mngr --version (catches SIGILL on mngr CLI startup) ---"
                mngr --version 2>&1 || echo "rc=$?"
                echo "--- system-interface --help (catches SIGILL on system_interface startup) ---"
                system-interface --help 2>&1 | head -10 || echo "rc=$?"
                echo "--- /mngr/code/.venv/bin/system-interface --help (sync-installed copy) ---"
                /mnt/lima-mngr-*/code/.venv/bin/system-interface --help 2>&1 | head -10 || echo "rc=$?"
                echo "--- python -c import paramiko (in mngr tool venv) ---"
                MNGR_PY=$(head -1 $(which mngr 2>/dev/null) 2>/dev/null | sed "s|^#!||")
                if [ -n "$MNGR_PY" ]; then
                  echo "mngr python: $MNGR_PY"
                  "$MNGR_PY" -c "import paramiko; print(\"paramiko OK\")" 2>&1 || echo "rc=$?"
                fi
              ' 2>&1 | tail -25
              echo
              echo "=== curl system_interface (port 1234) from VM ==="
              "$LIMA" shell "$VM" -- curl -s -m 3 -o /dev/null -w 'http_code=%{http_code} time=%{time_total}\n' http://localhost:1234/health 2>&1 | head -5
              echo
              echo "=== ps aux in VM ==="
              "$LIMA" shell "$VM" -- sudo ps auxf 2>&1 | grep -iE "bootstrap|system|web-server|uv run|tmux" | head -30
              echo
              echo "=== bootstrap.log (if present) ==="
              "$LIMA" shell "$VM" -- sudo find /var/log /tmp /mngr -name 'bootstrap*' -type f 2>/dev/null | head -5
              "$LIMA" shell "$VM" -- sudo bash -c 'tail -40 /var/log/bootstrap*.log /tmp/bootstrap*.log /mngr/bootstrap*.log 2>/dev/null' | head -50
              echo
              echo "=== mngr forward host-side reach via SSH (port 8421) ==="
              curl -s -m 3 -o /dev/null -w 'http_code=%{http_code} time=%{time_total}\n' http://localhost:8421/ 2>&1
              exit 0
            fi
            echo
            echo "=== container: $CID ==="
            echo "=== docker exec ss -tlnp ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" ss -tlnp 2>&1 | head -30
            echo
            echo "=== tmux list-sessions inside container ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" tmux list-sessions 2>&1 | head -20
            echo
            echo "=== tmux capture-pane svc-system_interface ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" tmux capture-pane -t svc-system_interface -p 2>&1 | tail -40
            echo
            echo "=== tmux list-windows on minds-system-services ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" tmux list-windows -t minds-system-services 2>&1 | head -40
            echo
            echo "=== tmux capture-pane on each service window ==="
            for win in $("$LIMA" shell "$VM" -- sudo docker exec "$CID" tmux list-windows -t minds-system-services -F '#{window_name}' 2>/dev/null); do
              echo "--- $win ---"
              "$LIMA" shell "$VM" -- sudo docker exec "$CID" tmux capture-pane -t "minds-system-services:$win" -p 2>&1 | tail -25
              echo
            done
            echo "=== services.toml ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" cat /mngr/code/services.toml 2>&1 | head -60
            echo
            echo "=== bootstrap log ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" find /var/log /tmp /mngr -name "bootstrap*" -type f 2>/dev/null | head -5
            echo
            echo "=== container arch + cpu features ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" bash -c '
              echo "uname -m: $(uname -m)"
              echo "dpkg arch: $(dpkg --print-architecture)"
              python3 -c "import platform; print(\"python platform:\", platform.machine(), platform.processor())"
              echo "--- cpuinfo (features) ---"
              grep -E "^(processor|Features|CPU implementer|CPU part|CPU variant|model name)" /proc/cpuinfo | head -10
            ' 2>&1 | tail -15
            echo
            echo "=== VM lima cpuinfo (host the docker container runs on) ==="
            "$LIMA" shell "$VM" -- bash -c 'uname -m; grep -E "^(processor|Features|CPU implementer|CPU part|model name)" /proc/cpuinfo | head -10' 2>&1 | tail -12
            echo
            echo "=== TEST: bisect paramiko import inside agent container ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" bash -c '
              MNGR_PY=$(head -1 $(which mngr 2>/dev/null) 2>/dev/null | sed "s|^#!||")
              if [ -z "$MNGR_PY" ]; then echo "(mngr not installed)"; exit 0; fi
              echo "mngr python: $MNGR_PY"
              for stmt in \
                "import sys; print(sys.version)" \
                "import cryptography; print(cryptography.__version__)" \
                "from cryptography.hazmat.bindings._rust import openssl" \
                "from cryptography.hazmat.backends.openssl.backend import backend" \
                "import bcrypt" \
                "import nacl.bindings" \
                "import cffi" \
                "import paramiko" \
                "import pyinfra"; do
                echo "--- $stmt ---"
                "$MNGR_PY" -c "$stmt; print(\"OK\")" 2>&1 || echo "rc=$?"
              done
            ' 2>&1 | tail -40
            echo
            echo "=== /var/log/cloud-init-output.log tail (VM) ==="
            "$LIMA" shell "$VM" -- tail -40 /var/log/cloud-init-output.log 2>&1 || true
            echo
            echo "=== curl localhost:1234 from container (system_interface default port) ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" curl -s -m 3 http://localhost:1234/health 2>&1 | head -5
            echo
            echo "=== ps inside container ==="
            "$LIMA" shell "$VM" -- sudo docker exec "$CID" ps auxf 2>&1 | head -40
          } > /tmp/launch-to-msg-logs/agent-probe.log 2>&1
          cat /tmp/launch-to-msg-logs/agent-probe.log

      - name: collect screenshots + diagnostics
        if: always()
        run: |
          mkdir -p artifacts
          # Screenshots from both the bash phase (`screencapture -x`) and the
          # Playwright phase; numbered so they sort in flow order.
          if [ -d /tmp/launch-to-msg-screenshots ]; then
            cp -R /tmp/launch-to-msg-screenshots artifacts/screenshots 2>/dev/null || true
          fi
          # Diagnostic logs (also useful on success for tuning).
          [ -d /tmp/launch-to-msg-logs ] && cp -R /tmp/launch-to-msg-logs artifacts/ || true
          [ -d "$HOME/.minds/logs" ] && cp -R "$HOME/.minds/logs" artifacts/ || true
          [ -d "$HOME/.minds/events" ] && cp -R "$HOME/.minds/events" artifacts/ || true
          [ -d "$HOME/.minds/mngr" ] && cp -R "$HOME/.minds/mngr"/*/events artifacts/agent-events 2>/dev/null || true
          log show --process Minds --last 5m 2>/dev/null > artifacts/macos-console.log || true
          ls -la "$HOME/.minds" > artifacts/minds-dir-listing.txt 2>&1 || true
          [ -f /tmp/minds-electron.log ] && cp /tmp/minds-electron.log artifacts/ || true
          [ -d /tmp/slack-mock ] && cp -R /tmp/slack-mock artifacts/ 2>/dev/null || true
          # Latchkey gateway state (encryption_key excluded by directory selection).
          if [ -d "$HOME/.minds/latchkey" ]; then
            mkdir -p artifacts/latchkey
            cp -R "$HOME/.minds/latchkey/mngr_latchkey" artifacts/latchkey/ 2>/dev/null || true
            cp "$HOME/.minds/latchkey/latchkey_gateway.log" artifacts/latchkey/ 2>/dev/null || true
            cp "$HOME/.minds/latchkey/latchkey_ensure_browser.log" artifacts/latchkey/ 2>/dev/null || true
          fi
      - uses: actions/upload-artifact@v7
        # Always upload: green runs are inspected too (screenshots + timings).
        if: always()
        with:
          name: launch-to-first-message-${{ github.run_id }}
          path: artifacts/
          retention-days: 7

      - name: write timing + screenshot summary
        if: always()
        run: |
          shots_dir=artifacts/screenshots
          if [ ! -d "$shots_dir" ]; then
            echo "(no screenshots to summarize)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # ---- Timing metrics block --------------------------------------
          # launch-to-msg-timings.json (written by the e2e) nests timings
          # under per-workspace keys (`.w1`, `.w2`, ...); emit one row per
          # workspace.
          timings_json="$shots_dir/launch-to-msg-timings.json"
          if [ -f "$timings_json" ]; then
            {
              echo "## Agent creation timings"
              echo ""
              echo "| Workspace | Host name | Total | Phases |"
              echo "|---|---|---|---|"
              jq -r 'to_entries[] | "| \(.key) | \(.value.host_name // "?") | \(.value.total_create_s // 0)s | \(.value.phase_durations_s // {} | to_entries | map("\(.key)=\(.value)s") | join(" | ")) |"' "$timings_json"
              echo ""
              echo '```json'
              # Ensure a trailing newline so the closing fence doesn't merge
              # onto the last JSON line and swallow the rest of the summary.
              cat "$timings_json"
              echo
              echo '```'
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # ---- Flow screenshot manifest ----------------------------------
          # Screenshots ride only in the run artifact (never git). `.win.png`
          # is the page Playwright asked Electron to render; the `.desktop.png`
          # dupe is the full desktop (often whichever window the OS had on top).
          artifact_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          {
            echo "## Flow screenshots"
            echo ""
            echo "Screenshots ride in the [\`launch-to-first-message-${{ github.run_id }}\` artifact]($artifact_url) (download + open locally)."
            echo ""
            echo "| Milestone | Per-window (.win.png) | Full-desktop (.desktop.png) |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          # Glob order is lexicographic, which matches the zero-padded
          # milestone prefixes (00-, 04b-, ..., 99-).
          for win in "$shots_dir"/*.win.png; do
            [ -f "$win" ] || continue
            base=$(basename "$win" .win.png)
            desk="$shots_dir/${base}.png"
            win_cell="\`${base}.win.png\`"
            desk_cell="—"
            [ -f "$desk" ] && desk_cell="\`${base}.png\`"
            echo "| $base | $win_cell | $desk_cell |" >> "$GITHUB_STEP_SUMMARY"
          done
      - name: post-test cleanup
        if: always()
        run: |
          # Wipe state so the runner sits idle clean. The script exits
          # non-zero if a VM / ~/.minds / the app survived, so a leak on this
          # non-ephemeral runner fails the job instead of rotting silently.
          bash apps/minds/scripts/mac-runner-reset.sh

  # Vanilla `macos-latest` cold-launch smoke: the same binary the `build`
  # job produced (or cache-hit) gets installed on a fresh GHA-hosted Mac
  # and asserted via the macos-launch Playwright spec. Runs in parallel
  # with `launch_to_msg` (both consume the build artifact, neither blocks
  # the other); the workflow is red if either fails.
  macos_launch:
    needs: [check_should_run, build]
    if: needs.check_should_run.outputs.should_run == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      # Checkout the trigger ref (not the frozen mngr SHA) so the e2e
      # harness (playwright spec + fixtures) is the version being iterated,
      # matching launch_to_msg. The binary under test is pinned to the
      # frozen mngr SHA via the build artifact below, not this checkout.
      - uses: actions/checkout@v6
      - name: install minds.app from the build job's artifact
        run: |
          TMP=$(mktemp -d)
          curl -fSL --silent --show-error -o "$TMP/minds.zip" "${{ needs.build.outputs.app_zip_url }}"
          unzip -q -d "$TMP" "$TMP/minds.zip"
          sudo cp -R "$TMP/Minds.app" /Applications/Minds.app
          sudo xattr -dr com.apple.quarantine /Applications/Minds.app || true
          defaults read /Applications/Minds.app/Contents/Info.plist CFBundleVersion
      - name: setup node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
      - name: setup pnpm
        run: npm install -g pnpm@10.33.4 && pnpm --version
      - name: pnpm install (apps/minds dev deps incl. playwright)
        working-directory: apps/minds
        run: pnpm install --frozen-lockfile
      - name: run macos-launch spec
        working-directory: apps/minds
        run: |
          # Headless on CI; the spec asserts DOM state and the chrome
          # iframe sources -- no display dependency. `html` reporter writes
          # a browsable report with embedded screenshots and traces;
          # Playwright skips opening it when stdout isn't a TTY (CI is fine).
          pnpm exec playwright test \
            --config=test/e2e/playwright.config.js \
            macos-launch.spec.js \
            --reporter=list,html
      - name: upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-launch-playwright-report-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            apps/minds/test-results/
            apps/minds/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  # Record the (mngr main HEAD, DEFAULT_WORKSPACE_TEMPLATE main HEAD) pair we just verified
  # green so the next run can skip if nothing has moved. Only runs when
  # BOTH downstream jobs succeeded -- a partial green doesn't move the
  # marker, so the next slot retries automatically.
  update_marker:
    needs: [check_should_run, launch_to_msg, macos_launch]
    if: needs.launch_to_msg.result == 'success' && needs.macos_launch.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: write marker file
        env:
          PAIR_KEY: ${{ needs.check_should_run.outputs.pair_key }}
          MNGR_SHA: ${{ needs.check_should_run.outputs.mngr_sha }}
          DEFAULT_WORKSPACE_TEMPLATE_SHA:  ${{ needs.check_should_run.outputs.default_workspace_template_sha }}
        run: |
          set -euo pipefail
          {
            echo "pair_key: $PAIR_KEY"
            echo "mngr: $MNGR_SHA"
            echo "default_workspace_template:  $DEFAULT_WORKSPACE_TEMPLATE_SHA"
            echo "saved_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } | tee /tmp/launch-to-msg-marker.txt
      - name: save marker cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/launch-to-msg-marker.txt
          key: launch-to-msg-green-mngr-${{ needs.check_should_run.outputs.mngr_sha }}-default-workspace-template-${{ needs.check_should_run.outputs.default_workspace_template_sha }}
      - name: emit summary
        run: |
          {
            echo "## Marker updated"
            echo "- cache key: \`launch-to-msg-green-mngr-${{ needs.check_should_run.outputs.mngr_sha }}-default-workspace-template-${{ needs.check_should_run.outputs.default_workspace_template_sha }}\`"
            echo "- mngr: \`${{ needs.check_should_run.outputs.mngr_sha }}\`"
            echo "- DEFAULT_WORKSPACE_TEMPLATE:  \`${{ needs.check_should_run.outputs.default_workspace_template_sha }}\`"
            echo ""
            echo "Inspect green pairs (the Caches web UI cannot filter by key prefix):"
            echo ""
            echo "\`\`\`"
            echo "gh cache list --repo ${{ github.repository }} --key launch-to-msg-green-mngr-"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Post a status summary to Slack for every run (cron + dispatch). No-ops
  # when SLACK_LAUNCH_TO_MSG_WEBHOOK isn't configured. Uses the curl-the-
  # webhook approach directly so we don't pull in a third-party action.
  notify_slack:
    needs: [check_should_run, build, launch_to_msg, macos_launch, update_marker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Slack webhook from Vault (migrated off the SLACK_LAUNCH_TO_MSG_WEBHOOK
      # GitHub Actions secret). continue-on-error so a Vault hiccup never kills
      # this always()-run notification: if the fetch fails, WEBHOOK stays empty
      # and the step below no-ops with a warning -- exactly as before when the
      # webhook was unset.
      - name: Fetch Slack webhook from Vault
        continue-on-error: true
        uses: imbue-ai/use-vault-secrets@main
        with:
          role: mngr_ci_gh
          secrets: |
            mngr/ci/SLACK_LAUNCH_TO_MSG_WEBHOOK
      - name: post status to slack
        env:
          WEBHOOK: ${{ env.SLACK_LAUNCH_TO_MSG_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOULD_RUN: ${{ needs.check_should_run.outputs.should_run }}
          MNGR_SHA: ${{ needs.check_should_run.outputs.mngr_sha }}
          DEFAULT_WORKSPACE_TEMPLATE_SHA:  ${{ needs.check_should_run.outputs.default_workspace_template_sha }}
          MNGR_REF: ${{ needs.check_should_run.outputs.mngr_ref }}
          DEFAULT_WORKSPACE_TEMPLATE_REF:  ${{ needs.check_should_run.outputs.default_workspace_template_ref }}
          BUILD_RESULT:         ${{ needs.build.result }}
          LAUNCH_TO_MSG_RESULT: ${{ needs.launch_to_msg.result }}
          MACOS_LAUNCH_RESULT:  ${{ needs.macos_launch.result }}
          UPDATE_MARKER_RESULT: ${{ needs.update_marker.result }}
          CHECK_SHOULD_RUN_RESULT: ${{ needs.check_should_run.result }}
          # Per-run e2e metrics; empty when launch_to_msg didn't run or
          # didn't reach the relevant point.
          LAUNCH_TO_READY_S: ${{ needs.launch_to_msg.outputs.launch_to_ready }}
          W1_CREATE_S: ${{ needs.launch_to_msg.outputs.w1_create }}
          W2_CREATE_S: ${{ needs.launch_to_msg.outputs.w2_create }}
          # ToDesktop .zip URL; empty when build was skipped.
          APP_ZIP_URL: ${{ needs.build.outputs.app_zip_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ -z "$WEBHOOK" ]]; then
            echo "::warning::SLACK_LAUNCH_TO_MSG_WEBHOOK not set -- skipping slack notification"
            exit 0
          fi
          # Total wallclock from when the run was queued to now. GNU date
          # parses ISO-8601 directly on Ubuntu runners.
          start_iso=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --jq '.run_started_at')
          start_s=$(date -d "$start_iso" +%s)
          now_s=$(date +%s)
          total_s=$((now_s - start_s))
          fmt_duration() {
            local s=$1
            if (( s < 60 )); then
              printf '%ds' "$s"
            else
              printf '%dm%02ds' $((s / 60)) $((s % 60))
            fi
          }
          duration=$(fmt_duration "$total_s")
          # Classify the outcome.
          failed_jobs=""
          cancelled_jobs=""
          if [[ "$CHECK_SHOULD_RUN_RESULT" == "failure" ]]; then
            failed_jobs="check_should_run"
          else
            for pair in "build:$BUILD_RESULT" \
                        "launch_to_msg:$LAUNCH_TO_MSG_RESULT" \
                        "macos_launch:$MACOS_LAUNCH_RESULT" \
                        "update_marker:$UPDATE_MARKER_RESULT"; do
              name="${pair%%:*}"
              result="${pair##*:}"
              case "$result" in
                failure)   failed_jobs="$failed_jobs $name" ;;
                cancelled) cancelled_jobs="$cancelled_jobs $name" ;;
              esac
            done
          fi
          if [[ -n "$failed_jobs" ]]; then
            emoji=":x:"
            verdict_word="failed"
            detail=" (failed:$failed_jobs)"
          elif [[ -n "$cancelled_jobs" ]]; then
            emoji=":warning:"
            verdict_word="cancelled"
            detail=" (cancelled:$cancelled_jobs)"
          elif [[ "$SHOULD_RUN" != "true" ]]; then
            emoji=":fast_forward:"
            verdict_word="skipped"
            detail=""
          else
            emoji=":white_check_mark:"
            verdict_word="succeeded"
            detail=""
          fi
          MNGR_SHORT="${MNGR_SHA:0:12}"
          DEFAULT_WORKSPACE_TEMPLATE_SHORT="${DEFAULT_WORKSPACE_TEMPLATE_SHA:0:12}"
          # Format the e2e per-run metrics line. Each metric is the raw
          # float in seconds; only include the ones we actually got, so a
          # mid-W2 failure still shows launch->ready and w1.
          fmt_float_s() {
            local f=$1
            [[ -z "$f" ]] && return
            local s=${f%%.*}
            fmt_duration "$s"
          }
          # Build metrics line: `[_label:_ *value* | _label:_ *value* | ...]`
          metrics_inner=""
          sep=""
          for kv in "_launch to ready:_|$LAUNCH_TO_READY_S" \
                    "_w1 create:_|$W1_CREATE_S" \
                    "_w2 create:_|$W2_CREATE_S"; do
            label="${kv%%|*}"
            v="${kv##*|}"
            [[ -z "$v" ]] && continue
            metrics_inner+="${sep}${label} *$(fmt_float_s "$v")*"
            sep=" | "
          done
          metrics_line=""
          [[ -n "$metrics_inner" ]] && metrics_line="[${metrics_inner}]"
          # Build links line: `[todesktop(mac-arm64) | <run logs> | <mngr commit> | <default_workspace_template commit>]`.
          # Dashboard + .dmg URLs are both derived from app_zip_url's
          # <APP_ID>/builds/<BID> segment.
          binary_link=""
          if [[ -n "$APP_ZIP_URL" && "$APP_ZIP_URL" =~ dl\.todesktop\.com/([^/]+)/builds/([^/]+)/ ]]; then
            td_app_id="${BASH_REMATCH[1]}"
            td_build_id="${BASH_REMATCH[2]}"
            dashboard_url="https://app.todesktop.com/apps/${td_app_id}/builds/${td_build_id}"
            dmg_url="https://dl.todesktop.com/${td_app_id}/builds/${td_build_id}/mac/dmg/arm64"
            binary_link="<${dashboard_url}|todesktop>(<${dmg_url}|mac-arm64>)"
          fi
          links_inner=""
          sep=""
          if [[ -n "$binary_link" ]]; then
            links_inner+="$binary_link"
            sep=" | "
          fi
          links_inner+="${sep}<${RUN_URL}|run logs>"
          links_inner+=" | <https://github.com/imbue-ai/mngr/commit/${MNGR_SHA}|mngr commit>"
          links_inner+=" | <https://github.com/imbue-ai/default-workspace-template/commit/${DEFAULT_WORKSPACE_TEMPLATE_SHA}|default_workspace_template commit>"
          links_line="[${links_inner}]"
          # Assemble: verdict line, refs line, metrics line (omitted when
          # empty), links line.
          line1=$(printf '%s *launch-to-msg* — %s in %s%s, _trigger=_ `%s`' \
            "$emoji" "$verdict_word" "$duration" "$detail" "$TRIGGER")
          # Show "<ref> (<commit>)" when the ref is a name (tag / branch);
          # just the commit when the input was already a raw 40-char SHA.
          mngr_label="\`${MNGR_SHORT}\`"
          [[ -n "$MNGR_REF" && ! "$MNGR_REF" =~ ^[0-9a-f]{40}$ ]] && mngr_label="\`${MNGR_REF}\` (\`${MNGR_SHORT}\`)"
          default_workspace_template_label="\`${DEFAULT_WORKSPACE_TEMPLATE_SHORT}\`"
          [[ -n "$DEFAULT_WORKSPACE_TEMPLATE_REF" && ! "$DEFAULT_WORKSPACE_TEMPLATE_REF" =~ ^[0-9a-f]{40}$ ]] && default_workspace_template_label="\`${DEFAULT_WORKSPACE_TEMPLATE_REF}\` (\`${DEFAULT_WORKSPACE_TEMPLATE_SHORT}\`)"
          line2="[_mngr_ ${mngr_label} | _DEFAULT_WORKSPACE_TEMPLATE_ ${default_workspace_template_label}]"
          if [[ -n "$metrics_line" ]]; then
            text=$(printf '%s\n%s\n%s\n%s' "$line1" "$line2" "$metrics_line" "$links_line")
          else
            text=$(printf '%s\n%s\n%s' "$line1" "$line2" "$links_line")
          fi
          payload=$(printf '%s' "$text" | jq -Rs '{text: .}')
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "$payload" "$WEBHOOK"
