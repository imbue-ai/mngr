name: TMR (periodic gate)

# Reusable gate shared by the per-variant scheduled TMR wrappers
# (tmr-mngr-scheduled.yml, tmr-minds-scheduled.yml). Each variant passes its
# own `label`, so their periodic PRs -- and this gate's decisions -- stay
# independent.
#
# At the top of each scheduled run, this looks for an open PR from a prior
# scheduled run of the SAME variant (identified by `label`):
#   - none open                 -> proceed.
#   - one open, > stale_days old -> close it (deleting its branch), then
#                                  proceed; the new run's PR is linked back
#                                  as a follow-up comment on the closed PR.
#   - one open, <= stale_days old -> skip this firing and post a comment on
#                                  the open PR explaining the policy. The
#                                  comment is posted fresh each skipped day
#                                  (intentional: the recurring pings are the
#                                  nudge to act on the open PR).

on:
  workflow_call:
    inputs:
      label:
        description: "The periodic-PR label that scopes this gate to one variant (e.g. tmr-mngr-periodic)."
        type: string
        required: true
      stale_days:
        description: "Auto-close an open periodic PR once it is older than this many days."
        type: string
        required: false
        default: "4"
    outputs:
      proceed:
        description: "Whether the scheduled run should proceed."
        value: ${{ jobs.gate.outputs.proceed }}
      supersedes_pr:
        description: "PR number this run superseded (auto-closed as stale), or empty."
        value: ${{ jobs.gate.outputs.supersedes_pr }}

# The `run` job below calls the reusable tmr.yml, whose job needs
# `id-token: write` to authenticate to Vault (it fetches its credentials from
# Vault now). A job that calls a reusable workflow passes down the caller's
# workflow-level permissions, so grant them here. The `gate` job sets its own
# (narrower) permissions and is unaffected.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      STALE_DAYS: ${{ inputs.stale_days }}
      LABEL: ${{ inputs.label }}
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
      supersedes_pr: ${{ steps.decide.outputs.supersedes_pr }}
    steps:
      - uses: actions/checkout@v6

      - name: Ensure periodic label exists
        run: |
          gh label create "$LABEL" \
            --color 1d76db \
            --description "Auto-opened by a scheduled TMR run ($LABEL)." \
            --repo "${{ github.repository }}" \
            2>/dev/null || true

      - name: Decide whether to proceed
        id: decide
        run: |
          set -euo pipefail
          # Take the oldest open PR with this variant's label (there should
          # only ever be one; oldest is the safest tiebreak if multiple
          # slipped in).
          pr_json=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label "$LABEL" \
            --state open \
            --json number,createdAt,url \
            --jq 'sort_by(.createdAt) | .[0] // empty')

          if [ -z "$pr_json" ]; then
            echo "No open $LABEL PR; proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "supersedes_pr=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_number=$(echo "$pr_json" | jq -r .number)
          pr_url=$(echo "$pr_json" | jq -r .url)
          created_at=$(echo "$pr_json" | jq -r .createdAt)
          created_epoch=$(date -u -d "$created_at" +%s)
          now_epoch=$(date -u +%s)
          age_days=$(( (now_epoch - created_epoch) / 86400 ))
          echo "Open $LABEL PR: $pr_url (age: ${age_days}d)"

          if [ "$age_days" -gt "$STALE_DAYS" ]; then
            gh pr comment "$pr_number" \
              --repo "${{ github.repository }}" \
              --body "Closing this PR because it has been open more than ${STALE_DAYS} days (current age: ${age_days}d). A new scheduled TMR run is starting now; if it produces an integrator branch, a follow-up comment will link the replacement PR."
            gh pr close "$pr_number" \
              --repo "${{ github.repository }}" \
              --delete-branch
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "supersedes_pr=$pr_number" >> "$GITHUB_OUTPUT"
          else
            gh pr comment "$pr_number" \
              --repo "${{ github.repository }}" \
              --body "Skipping today's scheduled TMR run because this PR (from a prior periodic run) is still open. Current age: ${age_days}d. Policy: scheduled runs are skipped while a periodic PR is open; once the PR is more than ${STALE_DAYS} days old it will be auto-closed and a fresh scheduled run will start. To resume periodic runs sooner, review and close this PR."
            echo "Skipping; PR #${pr_number} is ${age_days}d old (threshold: ${STALE_DAYS}d)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "supersedes_pr=" >> "$GITHUB_OUTPUT"
          fi
