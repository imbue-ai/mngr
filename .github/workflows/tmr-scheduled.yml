name: TMR (scheduled)

# Daily scheduled wrapper around the main TMR workflow.
#
# At the top of each run, the `gate` job looks for an open PR from a prior
# scheduled run (label: `tmr-periodic`):
#   - none open                 -> proceed.
#   - one open, > 4 days old    -> close it (deleting its branch), then
#                                  proceed; the new run's PR is linked back
#                                  as a follow-up comment on the closed PR.
#   - one open, <= 4 days old   -> skip this firing and post a comment on
#                                  the open PR explaining the policy. The
#                                  comment is posted fresh each skipped day
#                                  (intentional: the recurring pings are the
#                                  nudge to act on the open PR).
#
# Manual `workflow_dispatch` runs of TMR are intentionally independent of
# this logic: they don't touch the label and don't go through this gate.

on:
  # 08:00 UTC = 00:00 PST (UTC-8). GitHub Actions cron does not support
  # timezones, so this stays on PST year-round and shifts to 01:00 PDT in
  # summer.
  schedule:
    - cron: "0 8 * * *"
  # Manual trigger is provided only for testing the gate logic itself
  # (e.g. on a branch). Real ad-hoc TMR runs should use the main TMR
  # workflow's workflow_dispatch.
  workflow_dispatch:

# Don't let two scheduled firings overlap. A long-running TMR (up to 4h)
# could otherwise be in flight when the next cron fires; that next gate
# would see no open `tmr-periodic` PR (since the in-flight run hasn't
# opened it yet) and start a duplicate.
concurrency:
  group: tmr-scheduled
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      STALE_DAYS: "4"
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
      supersedes_pr: ${{ steps.decide.outputs.supersedes_pr }}
    steps:
      - uses: actions/checkout@v6

      - name: Ensure tmr-periodic label exists
        run: |
          gh label create tmr-periodic \
            --color 1d76db \
            --description "Auto-opened by a scheduled TMR run." \
            --repo "${{ github.repository }}" \
            2>/dev/null || true

      - name: Decide whether to proceed
        id: decide
        run: |
          set -euo pipefail
          # Take the oldest open `tmr-periodic` PR (there should only ever
          # be one; oldest is the safest tiebreak if multiple slipped in).
          pr_json=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label tmr-periodic \
            --state open \
            --json number,createdAt,url \
            --jq 'sort_by(.createdAt) | .[0] // empty')

          if [ -z "$pr_json" ]; then
            echo "No open tmr-periodic PR; proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "supersedes_pr=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_number=$(echo "$pr_json" | jq -r .number)
          pr_url=$(echo "$pr_json" | jq -r .url)
          created_at=$(echo "$pr_json" | jq -r .createdAt)
          created_epoch=$(date -u -d "$created_at" +%s)
          now_epoch=$(date -u +%s)
          age_days=$(( (now_epoch - created_epoch) / 86400 ))
          echo "Open tmr-periodic PR: $pr_url (age: ${age_days}d)"

          if [ "$age_days" -gt "$STALE_DAYS" ]; then
            gh pr comment "$pr_number" \
              --repo "${{ github.repository }}" \
              --body "Closing this PR because it has been open more than ${STALE_DAYS} days (current age: ${age_days}d). A new scheduled TMR run is starting now; if it produces an integrator branch, a follow-up comment will link the replacement PR."
            gh pr close "$pr_number" \
              --repo "${{ github.repository }}" \
              --delete-branch
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "supersedes_pr=$pr_number" >> "$GITHUB_OUTPUT"
          else
            gh pr comment "$pr_number" \
              --repo "${{ github.repository }}" \
              --body "Skipping today's scheduled TMR run because this PR (from a prior periodic run) is still open. Current age: ${age_days}d. Policy: scheduled runs are skipped while a periodic PR is open; once the PR is more than ${STALE_DAYS} days old it will be auto-closed and a fresh scheduled run will start. To resume periodic runs sooner, review and close this PR."
            echo "Skipping; PR #${pr_number} is ${age_days}d old (threshold: ${STALE_DAYS}d)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "supersedes_pr=" >> "$GITHUB_OUTPUT"
          fi

  run:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    uses: ./.github/workflows/tmr.yml
    secrets: inherit
    with:
      is_scheduled: true
      supersedes_pr: ${{ needs.gate.outputs.supersedes_pr }}
