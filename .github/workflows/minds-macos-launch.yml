name: minds macOS launch

# Runs the Playwright launch-smoke spec against the latest released
# minds.app on a vanilla macos-latest GitHub-hosted runner. No lima,
# no agent creation, no credentials. Covers the cold-launch +
# UI-renders-cleanly path that previously could only be checked by Tart
# under manual operation.
#
# Triggers on push and PR to wz/minds_onboard, plus workflow_dispatch.
# For workflow_dispatch, an optional app_zip_url input lets us point at
# a specific pre-release build instead of the auto-updater's latest.

on:
  push:
    branches: [wz/minds_onboard]
  pull_request:
    branches: [wz/minds_onboard, main]
  workflow_dispatch:
    inputs:
      app_zip_url:
        description: Direct URL of a minds.app zip to verify. Empty = use auto-updater latest.
        required: false
        type: string
        default: ''

jobs:
  macos-launch:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: resolve build URL
        id: url
        run: |
          if [[ -n "${{ inputs.app_zip_url }}" ]]; then
            URL='${{ inputs.app_zip_url }}'
            SRC='direct input'
          else
            URL=$(bash apps/minds/scripts/resolve-latest-todesktop-url.sh)
            SRC='resolved latest released build'
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Verifying: $URL ($SRC)"

      - name: install minds.app
        run: |
          TMP=$(mktemp -d)
          curl -fSL --silent --show-error -o "$TMP/minds.zip" "${{ steps.url.outputs.url }}"
          unzip -q -d "$TMP" "$TMP/minds.zip"
          sudo cp -R "$TMP/Minds.app" /Applications/Minds.app
          sudo xattr -dr com.apple.quarantine /Applications/Minds.app || true
          defaults read /Applications/Minds.app/Contents/Info.plist CFBundleVersion

      - name: setup node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - name: setup pnpm
        run: npm install -g pnpm@10.33.4 && pnpm --version

      - name: pnpm install (apps/minds dev deps incl. playwright)
        working-directory: apps/minds
        run: pnpm install --frozen-lockfile

      - name: run macos-launch spec
        working-directory: apps/minds
        run: |
          # Headless on CI; the spec doesn't depend on display, it just
          # asserts DOM state and the chrome iframe sources.
          # `html` reporter writes a browsable report with embedded
          # screenshots, traces, and the timeline (Playwright skips opening
          # it when stdout isn't a TTY -- CI is fine).
          pnpm exec playwright test \
            --config=test/e2e/playwright.config.js \
            macos-launch.spec.js \
            --reporter=list,html

      - name: upload Playwright report
        # Upload on success too so a passing rerun never erases a failing
        # attempt's screenshots, and tag the artifact with run_attempt so
        # reruns produce a distinct artifact instead of clobbering.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            apps/minds/test-results/
            apps/minds/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
