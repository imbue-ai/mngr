name: TMR (reintegrate)

# Re-runs the integrator phase against an already-completed TMR run, by
# discovering the run's testing agents via the tmr_run_name label and
# re-reading their outcome files. Useful when the original run's
# integrator failed or you want to re-integrate after manually adjusting
# something. The corresponding 'mngr tmr' invocation is documented in
# the auto-opened PR from the main TMR workflow.

on:
  workflow_dispatch:
    inputs:
      run_name:
        description: "The run name to reintegrate (e.g. 20260514184215). Find this in the original run's 'Reintegrate' line in the workflow log, or by running `mngr ls --include 'labels.tmr_run_name == \"...\"'` against the tmr-ci namespace."
        required: true
      mngr_user_id:
        description: "Override MNGR_USER_ID. Must match the user_id the original run was launched under (so the reintegrator can find the same modal namespace). Leave blank for the shared 'tmr-ci' namespace used by the main workflow."
        required: false
        default: ""

jobs:
  reintegrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      # Lets the use-vault-secrets step below mint a GitHub OIDC token for Vault.
      id-token: write
    env:
      MNGR_USER_ID: ${{ inputs.mngr_user_id != '' && inputs.mngr_user_id || 'tmr-ci' }}
      # The automatic per-run token, handed to the reducer agent (via
      # --reducer-env below) which pushes the integrated branch and opens the
      # PR. Intentionally NOT migrated to Vault.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/tmr-setup

      # ANTHROPIC key + imbue Modal workspace token (id + secret) from Vault,
      # migrated off the ANTHROPIC_API_KEY / MODAL_TOKEN_SECRET GitHub Actions
      # secrets and the MODAL_TOKEN_ID variable.
      - name: Fetch credentials from Vault
        uses: imbue-ai/use-vault-secrets@main
        with:
          role: mngr_ci_gh
          secrets: |
            mngr/ci/ANTHROPIC_API_KEY
            mngr/ci/MODAL_TOKEN_ID
            mngr/ci/MODAL_TOKEN_SECRET

      # AWS creds (optional): continue-on-error so a missing entry leaves AWS_*
      # unset and the orchestrator silently skips the S3 report mirror, matching
      # the pre-migration behaviour when the AWS_* secrets were unset.
      - name: Fetch AWS credentials from Vault (optional)
        continue-on-error: true
        uses: imbue-ai/use-vault-secrets@main
        with:
          role: mngr_ci_gh
          secrets: |
            mngr/ci/AWS_ACCESS_KEY_ID
            mngr/ci/AWS_SECRET_ACCESS_KEY

      - name: Run TMR reintegrator
        run: |
          mkdir -p tmr-report
          # The yolo agent type is synthesized inline (same as in tmr.yml).
          # The reintegrate path doesn't launch testing agents (it discovers
          # already-launched ones by the tmr_run_name label), so --provider
          # is unused. The integrator runs locally on the runner and uses
          # ANTHROPIC_API_KEY directly.
          #
          # Like tmr.yml, the reducer opens the run's PR itself (via
          # --reducer-env GH_TOKEN). --reducer-branch-suffix gives its branch a
          # unique name (this workflow run's id) so the reintegration always
          # opens a NEW PR rather than colliding with the original run's reducer
          # branch, which shares this run name.
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          uv run --project libs/mngr_tmr mngr tmr -vv \
            -S 'agent_types.yolo.parent_type="claude"' \
            -S 'agent_types.yolo.cli_args=["--dangerously-skip-permissions"]' \
            --agent-type yolo \
            --reintegrate \
            --run-name "${{ inputs.run_name }}" \
            --reducer-branch-suffix "r${{ github.run_id }}" \
            --env "MODAL_TOKEN_ID=${MODAL_TOKEN_ID}" \
            --env "MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}" \
            --env "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" \
            --reducer-env "GH_TOKEN=${GH_TOKEN}" \
            --reducer-env "TMR_GITHUB_REPOSITORY=${{ github.repository }}" \
            --reducer-env "TMR_BASE_BRANCH=${{ github.ref_name }}" \
            --reducer-env "TMR_RUN_URL=${run_url}" \
            --reducer-env "TMR_PR_LABEL=" \
            --reducer-env "TMR_PR_ASSIGNEES=" \
            --output-dir tmr-report \
            --format jsonl \
            | tee tmr-report/events.jsonl
          # Don't rely on pipefail to propagate mngr's exit code through tee:
          # in this step's GHA shell, the pipeline's non-zero left-side status
          # has been observed to read as success. Re-assert it explicitly.
          exit "${PIPESTATUS[0]}"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tmr-report
          path: tmr-report/
          retention-days: 30

      # The reducer opens the PR itself (see the "Open the pull request" section
      # of reducer.j2), the same as the main tmr.yml workflow. --reducer-branch-suffix
      # above keeps its branch distinct from the original run's, so this is always
      # a fresh PR.
