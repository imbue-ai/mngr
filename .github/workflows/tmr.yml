name: TMR

on:
  workflow_dispatch:
    inputs:
      test_paths:
        description: "Test paths (space-separated, passed as positional args before --)"
        required: true
        default: "libs/mngr/imbue/mngr/e2e/test_basic.py"
      pytest_args:
        description: "Pytest args after `--` (must be valid bash; quote values containing spaces, e.g. `-m \"foo and bar\"`)"
        required: true
        default: "-m release"
      agent_type:
        description: "Agent type (e.g. yolo, claude)"
        required: true
        default: "yolo"
      mngr_user_id:
        description: "Override MNGR_USER_ID for the orchestrator. Leave blank to use the shared 'tmr-ci' namespace, which lets any teammate with their key in .github/tmr-authorized-keys debug the CI-created modal agents (see libs/mngr_tmr/scripts/setup_tmr_ci_debug.py)."
        required: false
        default: ""
      additional_authorized_hosts:
        description: "Extra SSH public keys to install in authorized_keys on each agent host (one per line). Appended to the keys in .github/tmr-authorized-keys."
        required: false
        default: ""

jobs:
  tmr:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
      pull-requests: write
    env:
      MODAL_TOKEN_ID: ${{ vars.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MNGR_USER_ID: ${{ inputs.mngr_user_id != '' && inputs.mngr_user_id || 'tmr-ci' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.116

      - name: Configure git identity
        run: |
          git config user.email "dev@imbue.com"
          git config user.name "imbue-dev"

      - name: Pre-trust checkout for Claude
        # The integrator agent runs on the local host, where mngr_claude's
        # provisioning path goes through Claude Code's trust dialog (see
        # mngr_claude/plugin.py:interactively_dismiss_claude_dialogs). In CI
        # there is no human to accept the dialog and no prior ~/.claude.json
        # entry to inherit, so without seeding trust the integrator either
        # raises ClaudeDirectoryNotTrustedError or hangs waiting on the
        # dialog. Pre-seed the global ~/.claude.json with trust for the
        # checkout plus the other dialogs the plugin gates on; the per-agent
        # integrator config then inherits the trust via the plugin's
        # copy_project_config_from path.
        run: |
          uv run --project libs/mngr_claude python - <<'EOF'
          from pathlib import Path
          from imbue.mngr_claude.claude_config import (
              add_claude_trust_for_path,
              complete_onboarding,
              dismiss_effort_callout,
              find_user_claude_config,
          )
          config_path = find_user_claude_config()
          add_claude_trust_for_path(config_path, Path.cwd().resolve())
          dismiss_effort_callout(config_path)
          complete_onboarding(config_path)
          EOF

      - name: Run TMR orchestrator
        env:
          ADDITIONAL_AUTHORIZED_HOSTS: ${{ inputs.additional_authorized_hosts }}
        run: |
          mkdir -p tmr-report
          # The "yolo" agent type is normally defined in the user's personal
          # mngr config; CI has no such config, so we synthesize it inline via
          # `-S` overrides. parent_type=claude inherits the claude defaults,
          # and cli_args adds --dangerously-skip-permissions so non-interactive
          # agents do not hang on per-tool permission prompts.
          #
          # Authorized SSH keys come from two sources: the checked-in
          # .github/tmr-authorized-keys file (one key per teammate, for
          # periodic-run debugging) plus any extra lines passed via the
          # additional_authorized_hosts workflow input (for ad-hoc runs).
          authorized_host_args=()
          add_authorized_key() {
            line="$1"
            # Strip leading/trailing whitespace; skip blanks and comments.
            trimmed="$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            case "$trimmed" in
              ''|'#'*) return ;;
            esac
            authorized_host_args+=(--additional-authorized-host "$trimmed")
          }
          if [ -f .github/tmr-authorized-keys ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              add_authorized_key "$line"
            done < .github/tmr-authorized-keys
          fi
          while IFS= read -r line; do
            add_authorized_key "$line"
          done <<< "${ADDITIONAL_AUTHORIZED_HOSTS}"
          uv run --project libs/mngr_tmr mngr tmr -vv \
            -S 'agent_types.yolo.parent_type="claude"' \
            -S 'agent_types.yolo.cli_args=["--dangerously-skip-permissions"]' \
            --agent-type "${{ inputs.agent_type }}" \
            --provider modal \
            --use-snapshot \
            --env "MODAL_TOKEN_ID=${MODAL_TOKEN_ID}" \
            --env "MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}" \
            --env "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" \
            "${authorized_host_args[@]}" \
            --output-dir tmr-report \
            --format jsonl \
            ${{ inputs.test_paths }} \
            -- ${{ inputs.pytest_args }} \
            | tee tmr-report/events.jsonl

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmr-report
          path: tmr-report/
          retention-days: 30

      - name: Push integrator branch and open PR
        if: success()
        run: |
          set -euo pipefail
          branch=$(jq -r 'select(.event == "integrator_branch") | .branch_name' < tmr-report/events.jsonl | tail -n 1)
          if [ -z "$branch" ]; then
            echo "No integrator branch was produced (no fixes to integrate); skipping PR."
            exit 0
          fi
          echo "Integrator branch: $branch"
          git push --set-upstream origin "$branch"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "TMR: $branch" \
            --body "Automated PR from TMR workflow run [#${{ github.run_id }}]($run_url).

          The HTML report is attached as the \`tmr-report\` artifact on that run; download and open \`index.html\` in a browser." \
            --draft
