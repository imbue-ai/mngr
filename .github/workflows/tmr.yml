name: TMR

on:
  workflow_dispatch:
    inputs:
      test_paths:
        description: "Test paths (space-separated, passed as positional args before --)"
        required: true
        default: "libs/mngr/imbue/mngr/e2e/"
      pytest_args:
        description: "Pytest args after `--` (must be valid bash; quote values containing spaces, e.g. `-m \"foo and bar\"`)"
        required: true
        default: "-m release"
      mngr_user_id:
        description: "Override MNGR_USER_ID for the orchestrator. Leave blank to use the shared 'tmr-ci' namespace, which lets any teammate with their key in .github/tmr-authorized-keys debug the CI-created modal agents (see libs/mngr_tmr/scripts/setup_tmr_ci_debug.py)."
        required: false
        default: ""
      additional_authorized_hosts:
        description: "Extra SSH public keys to install in authorized_keys on each agent host (one per line). Appended to the keys in .github/tmr-authorized-keys."
        required: false
        default: ""
      run_name:
        description: "Override the auto-generated run name (default: a UTC YYYYMMDDHHMMSS timestamp). The reintegrate workflow uses this name to rediscover this run's agents."
        required: false
        default: ""
  # Invoked by the TMR (scheduled) workflow on its daily cron. The shared
  # inputs below mirror the workflow_dispatch inputs; the two extra inputs
  # (is_scheduled, supersedes_pr) are scheduled-run plumbing and are not
  # surfaced in the manual-dispatch UI.
  workflow_call:
    inputs:
      test_paths:
        type: string
        required: false
        default: "libs/mngr/imbue/mngr/e2e/"
      pytest_args:
        type: string
        required: false
        default: "-m release"
      mngr_user_id:
        type: string
        required: false
        default: ""
      additional_authorized_hosts:
        type: string
        required: false
        default: ""
      run_name:
        type: string
        required: false
        default: ""
      is_scheduled:
        description: "Set by the scheduled wrapper workflow. When true, the auto-opened PR is labeled `tmr-periodic` so the next scheduled run's gate can find it."
        type: boolean
        required: false
        default: false
      supersedes_pr:
        description: "Set by the scheduled wrapper workflow when this run was triggered after auto-closing a stale prior periodic PR. The newly-opened PR's number is posted as a follow-up comment on this PR."
        type: string
        required: false
        default: ""

jobs:
  tmr:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
      pull-requests: write
    env:
      MODAL_TOKEN_ID: ${{ vars.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MNGR_USER_ID: ${{ inputs.mngr_user_id != '' && inputs.mngr_user_id || 'tmr-ci' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # AWS creds enable mirroring the HTML report to s3://int8-shared-internal/tmr-reports/.
      # Optional -- the orchestrator silently skips upload when these are absent.
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/tmr-setup

      - name: Run TMR orchestrator
        env:
          ADDITIONAL_AUTHORIZED_HOSTS: ${{ inputs.additional_authorized_hosts }}
        run: |
          mkdir -p tmr-report
          # The "yolo" agent type is normally defined in the user's personal
          # mngr config; CI has no such config, so we synthesize it inline via
          # `-S` overrides. parent_type=claude inherits the claude defaults,
          # and cli_args adds --dangerously-skip-permissions so non-interactive
          # agents do not hang on per-tool permission prompts.
          #
          # Authorized SSH keys come from two sources: the checked-in
          # .github/tmr-authorized-keys file (one key per teammate, for
          # periodic-run debugging) plus any extra lines passed via the
          # additional_authorized_hosts workflow input (for ad-hoc runs).
          authorized_host_args=()
          add_authorized_key() {
            line="$1"
            # Strip leading/trailing whitespace; skip blanks and comments.
            trimmed="$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            case "$trimmed" in
              ''|'#'*) return ;;
            esac
            authorized_host_args+=(--additional-authorized-host "$trimmed")
          }
          if [ -f .github/tmr-authorized-keys ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              add_authorized_key "$line"
            done < .github/tmr-authorized-keys
          fi
          while IFS= read -r line; do
            add_authorized_key "$line"
          done <<< "${ADDITIONAL_AUTHORIZED_HOSTS}"
          run_name_args=()
          if [ -n "${{ inputs.run_name }}" ]; then
            run_name_args+=(--run-name "${{ inputs.run_name }}")
          fi
          uv run --project libs/mngr_tmr mngr tmr -vv \
            -S 'agent_types.yolo.parent_type="claude"' \
            -S 'agent_types.yolo.cli_args=["--dangerously-skip-permissions"]' \
            --agent-type yolo \
            --provider modal \
            --env "MODAL_TOKEN_ID=${MODAL_TOKEN_ID}" \
            --env "MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}" \
            --env "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" \
            "${authorized_host_args[@]}" \
            "${run_name_args[@]}" \
            --output-dir tmr-report \
            --format jsonl \
            ${{ inputs.test_paths }} \
            -- ${{ inputs.pytest_args }} \
            | tee tmr-report/events.jsonl
          # Don't rely on pipefail to propagate mngr's exit code through tee:
          # in this step's GHA shell, the pipeline's non-zero left-side status
          # has been observed to read as success. Re-assert it explicitly.
          exit "${PIPESTATUS[0]}"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tmr-report
          path: tmr-report/
          retention-days: 30

      - name: Push integrator branch and open PR
        if: success()
        env:
          IS_SCHEDULED: ${{ inputs.is_scheduled }}
          SUPERSEDES_PR: ${{ inputs.supersedes_pr }}
        run: |
          set -euo pipefail
          branch=$(jq -r 'select(.event == "integrator_branch") | .branch_name' < tmr-report/events.jsonl | tail -n 1)
          if [ -z "$branch" ]; then
            echo "No integrator branch was produced (no fixes to integrate); skipping PR."
            exit 0
          fi
          echo "Integrator branch: $branch"
          git push --set-upstream origin "$branch"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          report_url=$(jq -r 'select(.event == "report_url") | .url' < tmr-report/events.jsonl | tail -n 1)
          if [ -n "$report_url" ]; then
            report_line="HTML report: $report_url (also attached as the \`tmr-report\` artifact on the workflow run)."
          else
            report_line="HTML report: attached as the \`tmr-report\` artifact on the workflow run; download and open \`index.html\`. (AWS credentials missing, so no s3 mirror was published.)"
          fi
          # Scheduled runs label the auto-opened PR so the next day's gate
          # can find it, and assign it to the periodic-run owners. Manual
          # runs leave it unlabeled and unassigned.
          scheduled_args=()
          if [ "$IS_SCHEDULED" = "true" ]; then
            scheduled_args+=(--label tmr-periodic)
            scheduled_args+=(--assignee qi-imbue --assignee joshalbrecht)
          fi
          new_pr_url=$(gh pr create \
            --base "${{ github.ref_name }}" \
            --head "$branch" \
            --title "TMR: $branch" \
            --body "Automated PR from TMR workflow run [#${{ github.run_id }}]($run_url).

          $report_line" \
            --draft \
            "${scheduled_args[@]}")
          echo "Opened $new_pr_url"
          # If this scheduled run superseded a stale prior periodic PR
          # (closed up front by the gate), leave a breadcrumb on it pointing
          # at the replacement.
          if [ -n "$SUPERSEDES_PR" ]; then
            gh pr comment "$SUPERSEDES_PR" --body "Superseded by $new_pr_url from a fresh scheduled TMR run."
          fi
