name: TMR

# The default inputs below run the *mngr* release suite (variant `tmr`, scoped to
# libs/mngr). To dispatch the *minds* variant instead, set:
#   test_paths:   apps/minds
#   name:         tmr-minds
#   mapper_prompt: apps/minds/tmr/mapper.j2
#   pytest_args:  -m "release and not minds_deployment and not minds_services and not minds_snapshot_resume"
# (the plain minds @release tests, which need no ci env / snapshot image). The
# capability suites additionally need their secrets passed via env -- see the
# `tmr-minds` justfile recipe, which is the canonical source for these flag sets.
on:
  workflow_dispatch:
    inputs:
      test_paths:
        description: "Test paths (space-separated, passed as positional args before --)"
        required: true
        # Default: all of mngr's release tests, not just the e2e tutorial ones.
        default: "libs/mngr"
      pytest_args:
        description: "Pytest args after `--` (must be valid bash; quote values containing spaces, e.g. `-m \"foo and bar\"`)"
        required: true
        # docker/docker_sdk release tests are excluded: they need a real Docker
        # daemon and run on a GitHub runner in release-tests.yml, not on the
        # Modal hosts TMR provisions (Docker-in-Docker via gVisor is too flaky).
        default: "-m \"release and not docker and not docker_sdk\""
      mngr_user_id:
        description: "Override MNGR_USER_ID for the orchestrator. Leave blank to use the shared 'tmr-ci' namespace, which lets any teammate with their key in .github/tmr-authorized-keys debug the CI-created modal agents (see libs/mngr_tmr/scripts/setup_tmr_ci_debug.py)."
        required: false
        default: ""
      additional_authorized_hosts:
        description: "Extra SSH public keys to install in authorized_keys on each agent host (one per line). Appended to the keys in .github/tmr-authorized-keys."
        required: false
        default: ""
      run_name:
        description: "Override the auto-generated run name (default: a UTC YYYYMMDDHHMMSS timestamp). The reintegrate workflow uses this name to rediscover this run's agents."
        required: false
        default: ""
      name:
        description: "Variant name; prefixes this run's agent/branch/host names (e.g. tmr-mngr, tmr-minds) so distinct suites stay separable. Must be a slug (alphanumerics, dashes, underscores)."
        required: false
        default: "tmr"
      mapper_prompt:
        description: "Optional repo-relative path to a Jinja template overriding the mapper prompt (blank = packaged default). For the minds variant use apps/minds/tmr/mapper.j2."
        required: false
        default: ""
      reducer_prompt:
        description: "Optional repo-relative path to a Jinja template overriding the reducer prompt (blank = packaged default)."
        required: false
        default: ""
  # Invoked by the per-variant scheduled wrappers (tmr-mngr-scheduled.yml,
  # tmr-minds-scheduled.yml) on their daily crons. The shared inputs below
  # mirror the workflow_dispatch inputs; the extra inputs (is_scheduled,
  # supersedes_pr, periodic_label) are scheduled-run plumbing and are not
  # surfaced in the manual-dispatch UI.
  workflow_call:
    inputs:
      test_paths:
        type: string
        required: false
        # Default: all of mngr's release tests, not just the e2e tutorial ones.
        default: "libs/mngr"
      pytest_args:
        type: string
        required: false
        # docker/docker_sdk release tests are excluded (see workflow_dispatch above).
        default: "-m \"release and not docker and not docker_sdk\""
      mngr_user_id:
        type: string
        required: false
        default: ""
      additional_authorized_hosts:
        type: string
        required: false
        default: ""
      run_name:
        type: string
        required: false
        default: ""
      name:
        type: string
        required: false
        default: "tmr"
      mapper_prompt:
        type: string
        required: false
        default: ""
      reducer_prompt:
        type: string
        required: false
        default: ""
      is_scheduled:
        description: "Set by the scheduled wrapper workflow. When true, the auto-opened PR is labeled with `periodic_label` so the next scheduled run's gate for that variant can find it."
        type: boolean
        required: false
        default: false
      periodic_label:
        description: "Label to attach to the auto-opened PR on scheduled runs (each variant uses its own, e.g. tmr-mngr-periodic / tmr-minds-periodic, so their gates stay independent). Only used when is_scheduled is true."
        type: string
        required: false
        default: "tmr-periodic"
      supersedes_pr:
        description: "Set by the scheduled wrapper workflow when this run was triggered after auto-closing a stale prior periodic PR. The newly-opened PR's number is posted as a follow-up comment on this PR."
        type: string
        required: false
        default: ""

jobs:
  tmr:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
      pull-requests: write
      # Lets the use-vault-secrets step below mint a GitHub OIDC token for Vault.
      id-token: write
    env:
      MNGR_USER_ID: ${{ inputs.mngr_user_id != '' && inputs.mngr_user_id || 'tmr-ci' }}
      # The automatic per-run token. Handed to the reducer agent (via
      # --reducer-env below) which pushes the integrated branch and opens the
      # PR; the workflow itself only uses it for the superseded-PR comment.
      # Intentionally NOT migrated to Vault (it can't meaningfully live there
      # and the automatic token is the right fit for same-repo pushes).
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/tmr-setup

      # ANTHROPIC key + imbue Modal workspace token (id + secret) from Vault,
      # migrated off the ANTHROPIC_API_KEY / MODAL_TOKEN_SECRET GitHub Actions
      # secrets and the MODAL_TOKEN_ID variable.
      - name: Fetch credentials from Vault
        uses: imbue-ai/use-vault-secrets@main
        with:
          role: mngr_ci_gh
          secrets: |
            mngr/ci/ANTHROPIC_API_KEY
            mngr/ci/MODAL_TOKEN_ID
            mngr/ci/MODAL_TOKEN_SECRET

      # AWS creds enable mirroring the HTML report to
      # s3://int8-shared-internal/tmr-reports/. Optional: continue-on-error so a
      # missing entry (or unreadable path) leaves AWS_* unset and the
      # orchestrator silently skips the upload -- matching the pre-migration
      # behaviour when the AWS_* GitHub Actions secrets were unset.
      - name: Fetch AWS credentials from Vault (optional)
        continue-on-error: true
        uses: imbue-ai/use-vault-secrets@main
        with:
          role: mngr_ci_gh
          secrets: |
            mngr/ci/AWS_ACCESS_KEY_ID
            mngr/ci/AWS_SECRET_ACCESS_KEY

      - name: Run TMR orchestrator
        env:
          ADDITIONAL_AUTHORIZED_HOSTS: ${{ inputs.additional_authorized_hosts }}
          IS_SCHEDULED: ${{ inputs.is_scheduled }}
          PERIODIC_LABEL: ${{ inputs.periodic_label }}
        run: |
          mkdir -p tmr-report
          # The "yolo" agent type is normally defined in the user's personal
          # mngr config; CI has no such config, so we synthesize it inline via
          # `-S` overrides. parent_type=claude inherits the claude defaults,
          # and cli_args adds --dangerously-skip-permissions so non-interactive
          # agents do not hang on per-tool permission prompts.
          #
          # Authorized SSH keys come from two sources: the checked-in
          # .github/tmr-authorized-keys file (one key per teammate, for
          # periodic-run debugging) plus any extra lines passed via the
          # additional_authorized_hosts workflow input (for ad-hoc runs).
          authorized_host_args=()
          add_authorized_key() {
            line="$1"
            # Strip leading/trailing whitespace; skip blanks and comments.
            trimmed="$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            case "$trimmed" in
              ''|'#'*) return ;;
            esac
            authorized_host_args+=(--additional-authorized-host "$trimmed")
          }
          if [ -f .github/tmr-authorized-keys ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              add_authorized_key "$line"
            done < .github/tmr-authorized-keys
          fi
          while IFS= read -r line; do
            add_authorized_key "$line"
          done <<< "${ADDITIONAL_AUTHORIZED_HOSTS}"
          run_name_args=()
          if [ -n "${{ inputs.run_name }}" ]; then
            run_name_args+=(--run-name "${{ inputs.run_name }}")
          fi
          # Variant name (branch/agent prefix) plus optional prompt-template
          # overrides. The prompt paths are repo-relative; blank means the
          # packaged default template is used.
          variant_args=(--name "${{ inputs.name }}")
          if [ -n "${{ inputs.mapper_prompt }}" ]; then
            variant_args+=(--mapper-prompt "${{ inputs.mapper_prompt }}")
          fi
          if [ -n "${{ inputs.reducer_prompt }}" ]; then
            variant_args+=(--reducer-prompt "${{ inputs.reducer_prompt }}")
          fi
          # The reducer opens this run's PR itself, so it -- and only it --
          # receives GH_TOKEN plus the context needed to write a useful
          # description. Mappers are the untrusted bulk of the run and must not
          # get a token that can push to the repo, hence --reducer-env.
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          pr_assignees=""
          pr_label=""
          if [ "$IS_SCHEDULED" = "true" ]; then
            pr_label="$PERIODIC_LABEL"
            pr_assignees="qi-imbue,joshalbrecht"
          fi
          uv run --project libs/mngr_tmr mngr tmr -vv \
            -S 'agent_types.yolo.parent_type="claude"' \
            -S 'agent_types.yolo.cli_args=["--dangerously-skip-permissions"]' \
            --agent-type yolo \
            --provider modal \
            --env "MODAL_TOKEN_ID=${MODAL_TOKEN_ID}" \
            --env "MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}" \
            --env "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" \
            --reducer-env "GH_TOKEN=${GH_TOKEN}" \
            --reducer-env "TMR_GITHUB_REPOSITORY=${{ github.repository }}" \
            --reducer-env "TMR_BASE_BRANCH=${{ github.ref_name }}" \
            --reducer-env "TMR_RUN_URL=${run_url}" \
            --reducer-env "TMR_PR_LABEL=${pr_label}" \
            --reducer-env "TMR_PR_ASSIGNEES=${pr_assignees}" \
            "${authorized_host_args[@]}" \
            "${run_name_args[@]}" \
            "${variant_args[@]}" \
            --output-dir tmr-report \
            --format jsonl \
            ${{ inputs.test_paths }} \
            -- ${{ inputs.pytest_args }} \
            | tee tmr-report/events.jsonl
          # Don't rely on pipefail to propagate mngr's exit code through tee:
          # in this step's GHA shell, the pipeline's non-zero left-side status
          # has been observed to read as success. Re-assert it explicitly.
          exit "${PIPESTATUS[0]}"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tmr-report
          path: tmr-report/
          retention-days: 30

      # The PR itself is opened by the reducer agent (see the "Open the pull
      # request" section of reducer.j2), which has the run's outcomes in hand
      # and so can write a description carrying the actual findings. This step
      # only leaves the breadcrumb on a superseded PR, which the reducer has no
      # way to know about.
      - name: Link superseded periodic PR
        if: success() && inputs.supersedes_pr != ''
        env:
          SUPERSEDES_PR: ${{ inputs.supersedes_pr }}
        run: |
          set -euo pipefail
          new_pr_url=$(jq -r 'select(.event == "pull_request_url") | .url' < tmr-report/events.jsonl | tail -n 1)
          if [ -z "$new_pr_url" ]; then
            echo "Reducer did not report a pull request URL; nothing to link."
            exit 0
          fi
          gh pr comment "$SUPERSEDES_PR" --body "Superseded by $new_pr_url from a fresh scheduled TMR run."
