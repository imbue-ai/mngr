name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0). Must match the mngr version in pyproject.toml.'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install build dependencies
        run: uv tool install build

      - name: Verify versions and pin consistency
        run: |
          # Determine expected mngr version from tag or workflow_dispatch input
          EXPECTED=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            EXPECTED="${{ github.ref_name }}"
            EXPECTED="${EXPECTED#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            EXPECTED="${{ inputs.version }}"
          fi

          if [ -n "$EXPECTED" ]; then
            uv run --all-packages scripts/verify_publish.py --expected-mngr-version "$EXPECTED"
          else
            uv run --all-packages scripts/verify_publish.py
          fi

      - name: Build all packages
        run: |
          set -euo pipefail
          pkg_dirs_output=$(uv run --all-packages scripts/verify_publish.py --list-package-dirs)
          mapfile -t pkg_dirs <<< "$pkg_dirs_output"
          for pkg_dir in "${pkg_dirs[@]}"; do
            echo "::group::Build $pkg_dir"
            pyproject-build "$pkg_dir" -o dist/
            echo "::endgroup::"
          done

      - name: Publish packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # Point the `release` branch at the just-published commit. The installer
  # (scripts/install.sh) and the lockfile-derived constraints file are both served
  # from `release`, so end users always fetch a matched, published pair (see
  # README install instructions, which curl from `release`). This workflow triggers
  # only on mngr `v*` tags (minds uses `minds-v*`), so `release` tracks mngr releases.
  update-release-branch:
    needs: publish
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fast-forward the release branch to this mngr release
        run: |
          set -euo pipefail
          # Non-fast-forward is rejected (releases advance linearly on main), which
          # surfaces any unexpected divergence instead of silently overwriting it.
          git push origin "${{ github.sha }}:refs/heads/release"
