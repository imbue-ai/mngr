name: mngr TMR (scheduled)

# Daily scheduled wrapper around the main TMR workflow for the *mngr* variant
# (libs/mngr release tests). The minds variant has its own sibling wrapper,
# tmr-minds-scheduled.yml; the two are independent (separate gate label,
# separate concurrency group, separate periodic PR).
#
# The `gate` job (shared reusable tmr-gate.yml, scoped by the
# `tmr-mngr-periodic` label) decides whether to proceed based on any open
# periodic PR from a prior mngr run -- see tmr-gate.yml for the policy.
#
# Manual `workflow_dispatch` runs of TMR are intentionally independent of this
# logic: they don't touch the label and don't go through this gate.

on:
  # 08:00 UTC = 00:00 PST (UTC-8). GitHub Actions cron does not support
  # timezones, so this stays on PST year-round and shifts to 01:00 PDT in
  # summer.
  schedule:
    - cron: "0 8 * * *"
  # Manual trigger is provided only for testing the gate logic itself
  # (e.g. on a branch). Real ad-hoc TMR runs should use the main TMR
  # workflow's workflow_dispatch.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  # The `run` job calls the reusable tmr.yml, whose job fetches its credentials
  # from Vault via a GitHub OIDC token. A called reusable workflow's job
  # permissions are capped by the caller's, so id-token: write must be granted
  # here for that Vault auth to succeed.
  id-token: write

# Don't let two scheduled firings of this variant overlap. A long-running TMR
# (up to 4h) could otherwise be in flight when the next cron fires; that next
# gate would see no open periodic PR (since the in-flight run hasn't opened it
# yet) and start a duplicate.
concurrency:
  group: tmr-mngr-scheduled
  cancel-in-progress: false

jobs:
  gate:
    uses: ./.github/workflows/tmr-gate.yml
    secrets: inherit
    with:
      label: tmr-mngr-periodic

  run:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    uses: ./.github/workflows/tmr.yml
    secrets: inherit
    with:
      # mngr variant: the tmr.yml defaults already target libs/mngr's release
      # suite (test_paths / pytest_args), so only the variant name and the
      # scheduled plumbing are set here. The name matches the `tmr-mngr`
      # justfile recipe so branches are `tmr-mngr/<run>/*`.
      name: tmr-mngr
      is_scheduled: true
      periodic_label: tmr-mngr-periodic
      supersedes_pr: ${{ needs.gate.outputs.supersedes_pr }}
