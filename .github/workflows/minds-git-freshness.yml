name: minds git freshness

# Weekly check that the bundled git payload for the minds desktop app is not
# behind on an upstream *git* release. The pin lives in
# apps/minds/scripts/git-manifest.json (.dugiteNativeTag / .gitVersion); the
# design is specs/minds-managed-git/concise.md.
#
# Two deliberate constraints, both mirroring the repo-wide dependency posture
# (the "Dependency cooldown" note in apps/minds/docs/desktop-app.md, backed by
# pnpm-workspace.yaml minimumReleaseAge and the packaged pyproject exclude-newer):
#
#   1. Cooldown: a dugite-native release younger than COOLDOWN_DAYS (14) is
#      ignored, so a freshly-published (possibly compromised) release is never
#      recommended before it has had time to be vetted and, if needed, yanked.
#   2. Security axis, not features: dugite-native tags are v<gitversion>-<build>.
#      We nag only when a cooldown-cleared release carries a newer upstream git
#      version (where git security fixes ship). A dugite rebuild that keeps the
#      same git version (a new -<build> suffix) is not chased -- that would be
#      forcing a packaging/feature bump, which this workflow deliberately avoids.
#
# It reconciles a single tracking issue matched by exact title (no label
# dependency): a cooldown-cleared newer git version opens/updates the issue;
# a pin that is current or ahead on the git-version axis closes it. The runbook
# lives in apps/minds/docs/desktop-app.md. For a genuinely urgent CVE a
# maintainer may bump before the cooldown at their discretion; the automated
# nag intentionally waits the window out.

on:
  # 16:00 UTC = 09:00 PDT / 08:00 PST. GitHub Actions cron has no timezone
  # support, so this stays on UTC year-round. The schedule only fires from the
  # default branch, so this file must be merged to main to activate.
  schedule:
    - cron: '0 16 * * 1'  # Mondays, 16:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: "minds: bundled git is behind an upstream git release"
      # Mirrors the repo-wide 14-day minimum release age (pnpm minimumReleaseAge
      # 20160 minutes; the packaged pyproject's exclude-newer "14 days").
      COOLDOWN_DAYS: "14"
    steps:
      - uses: actions/checkout@v6

      - name: Compare pinned git version against cooldown-cleared dugite-native releases
        run: |
          set -euo pipefail

          manifest="apps/minds/scripts/git-manifest.json"
          pinned_tag=$(jq -r '.dugiteNativeTag' "$manifest")
          pinned_gitver=$(jq -r '.gitVersion' "$manifest")
          if [ -z "$pinned_tag" ] || [ "$pinned_tag" = "null" ] || [ -z "$pinned_gitver" ] || [ "$pinned_gitver" = "null" ]; then
            echo "Could not read .dugiteNativeTag / .gitVersion from $manifest" >&2
            exit 1
          fi
          echo "Pinned: $pinned_tag (git $pinned_gitver)"

          # Fetch releases and pick the one with the HIGHEST git version among
          # those that have cleared the cooldown window (published at least
          # COOLDOWN_DAYS ago), excluding drafts and prereleases. A younger
          # release is deliberately ignored until vetted. Sorting by git
          # version -- not published date -- matters because upstream may cut
          # a patch release for an older git line after a newer line ships;
          # date-sorting would then hide the newer git from the nag.
          releases_json=$(mktemp)
          gh api "repos/desktop/dugite-native/releases?per_page=100" > "$releases_json"

          candidate=$(mktemp)
          jq '
            def gitver_parts:
              # v2.53.0-3 -> [2, 53, 0]; v2.53.0 -> [2, 53, 0]
              (.tag_name | ltrimstr("v") | split("-")[0] | split(".") | map(tonumber));
            [ .[]
              | select(.draft == false and .prerelease == false)
              | select((.published_at | fromdateiso8601) <= (now - (env.COOLDOWN_DAYS | tonumber) * 86400))
            ]
            # Highest git version wins; among equal git versions (same-git
            # rebuilds like v2.53.0 vs v2.53.0-3) prefer the newest published.
            | sort_by([gitver_parts, .published_at]) | reverse | (.[0] // null)
          ' "$releases_json" > "$candidate"

          if [ "$(jq -r 'if . == null then "null" else "ok" end' "$candidate")" = "null" ]; then
            echo "No dugite-native release has cleared the ${COOLDOWN_DAYS}-day cooldown yet; nothing to do."
            exit 0
          fi

          cand_tag=$(jq -r '.tag_name' "$candidate")
          cand_url=$(jq -r '.html_url' "$candidate")
          cand_published=$(jq -r '.published_at' "$candidate")
          # git version = tag with the leading 'v' and trailing '-<build>' removed
          # (v2.53.0-3 -> 2.53.0; v2.53.0 -> 2.53.0).
          cand_gitver="${cand_tag#v}"; cand_gitver="${cand_gitver%%-*}"
          echo "Highest-version cooldown-cleared release: $cand_tag (git $cand_gitver, published $cand_published)"

          # Locate the tracking issue purely by exact title. Search can return
          # partial-title matches, so filter to an exact equality in jq.
          matches=$(gh issue list \
            --state open \
            --search "in:title \"$ISSUE_TITLE\"" \
            --json number,title \
            --jq "[.[] | select(.title == \"$ISSUE_TITLE\") | .number]")
          issue_number=$(echo "$matches" | jq -r '.[0] // empty')
          extra_matches=$(echo "$matches" | jq -r '.[1:] | join(", ")')
          if [ -n "$extra_matches" ]; then
            echo "WARNING: multiple issues match the tracking title; operating on #$issue_number and ignoring: $extra_matches" >&2
          fi

          # Nag only if the cooldown-cleared candidate is a NEWER git version than
          # the pin (sort -V puts the higher semantic version last). Same or older
          # git version -- including a newer dugite -<build> of the same git -- is
          # treated as current, so non-security rebuilds are not chased.
          highest=$(printf '%s\n%s\n' "$pinned_gitver" "$cand_gitver" | sort -V | tail -1)
          if [ "$cand_gitver" = "$pinned_gitver" ] || [ "$highest" != "$cand_gitver" ]; then
            echo "Pin is current on the git-version axis (pinned git $pinned_gitver, candidate git $cand_gitver)."
            if [ -n "$issue_number" ]; then
              echo "Closing stale nag issue #$issue_number."
              gh issue close "$issue_number" --comment "Bundled git is on git $pinned_gitver; no cooldown-cleared newer git release."
            else
              echo "No open nag issue to close."
            fi
            exit 0
          fi

          echo "A newer upstream git release has cleared cooldown: git $pinned_gitver -> $cand_gitver ($cand_tag)."

          notes_excerpt=$(mktemp)
          jq -r '.body // ""' "$candidate" | head -n 40 > "$notes_excerpt"

          body_file=$(mktemp)
          {
            printf '%s\n\n' "The minds desktop app bundles git \`$pinned_gitver\` (dugite-native \`$pinned_tag\`). A newer upstream git release has cleared the ${COOLDOWN_DAYS}-day cooldown:"
            printf '%s\n' "- Pinned: git \`$pinned_gitver\` (\`$pinned_tag\`)"
            printf '%s\n\n' "- Available: git \`$cand_gitver\` ([\`$cand_tag\`]($cand_url), published $cand_published)"
            printf '%s\n\n' "git patch releases are frequently security fixes. Review the upstream git release notes for \`$cand_gitver\` to judge urgency, then bump per the runbook. Same-git-version dugite rebuilds are intentionally not chased; for a genuinely urgent CVE you may bump before the cooldown at your discretion."
            printf '%s\n\n' "### dugite-native \`$cand_tag\` release notes (excerpt)"
            printf '```\n'
            cat "$notes_excerpt"
            printf '\n```\n\n'
            printf '%s\n' "Runbook: \`apps/minds/docs/desktop-app.md\` (\"Updating the bundled git\"). Design: \`specs/minds-managed-git/concise.md\`."
          } > "$body_file"

          if [ -n "$issue_number" ]; then
            echo "Updating existing nag issue #$issue_number."
            gh issue edit "$issue_number" --body-file "$body_file"
          else
            echo "Creating nag issue."
            gh issue create --title "$ISSUE_TITLE" --body-file "$body_file"
          fi
