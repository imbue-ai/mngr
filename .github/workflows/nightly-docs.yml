name: Nightly Docs Update

on:
  schedule:
    - cron: "0 7 * * *" # Daily at 7am UTC (midnight PDT)
  workflow_dispatch: # Manual trigger

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history needed for git log

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are maintaining two living documents in this repository:
            ARCHITECTURE.md (developer architecture overview) and CHANGELOG.md (user-facing changelog).

            ## Step 1: Determine what changed

            Look at the git log for commits on main since the last time these docs were updated.
            Use the timestamp of the most recent entry in CHANGELOG.md, or if empty, look at the
            last 7 days of commits. Run:

              git log --oneline --since="$(git log -1 --format=%ci -- CHANGELOG.md ARCHITECTURE.md)" -- ':!*.md'

            If that returns nothing, there are no code changes to document -- exit early without
            making changes.

            However, as a sanity check, also verify that there have been *some* commits (of any
            kind) in the last 3 days:

              git log --oneline --since="3 days ago" -1

            If that also returns nothing, something is wrong with the environment (e.g. shallow
            clone, missing history, clock skew). In that case, do NOT exit silently -- instead
            output a clear warning like "WARNING: no commits found in the last 3 days, the
            environment may be misconfigured" and exit with a non-zero status.

            Read the diffs for any commits that touch non-test Python files, focusing on structural
            and user-facing changes:

              git diff <oldest_relevant_commit>..HEAD -- '*.py' ':!*_test.py' ':!test_*'

            ## Step 2: Update ARCHITECTURE.md (if needed)

            Read the current ARCHITECTURE.md. Only update it if the commits introduce:
            - New subsystems, modules, or architectural layers
            - New interfaces or abstract base classes
            - New plugin hooks or plugin types
            - Changes to the layered architecture or dependency graph
            - New applications or libraries in the monorepo

            Do NOT update ARCHITECTURE.md for:
            - Bug fixes, minor enhancements, or new fields on existing types
            - Test changes, CI changes, or documentation-only changes
            - Feature additions within existing subsystems (unless they add new patterns)

            The bar for updating ARCHITECTURE.md is high -- most days there should be no changes.

            ## Step 3: Update CHANGELOG.md

            Append new entries to CHANGELOG.md for user-visible changes. Follow the existing format
            in the file. Group entries by date (## YYYY-MM-DD). Within each date, categorize as:
            - **Added** -- new features, commands, or capabilities
            - **Changed** -- modifications to existing behavior
            - **Fixed** -- bug fixes
            - **Removed** -- removed features or deprecated items

            Skip internal-only changes (test infrastructure, CI config, refactoring with no
            user-visible effect). Each entry should be one concise line describing what changed
            from the user's perspective.

            ## Step 4: Commit and create PR

            If you made any changes, commit them with message "docs: nightly update to ARCHITECTURE.md and CHANGELOG.md"
            and push to a new branch named "docs/nightly-update-YYYY-MM-DD" (using today's date).
            Then create a PR with a summary of what was updated and why.

            If no changes were needed, do nothing.
          claude_args: |
            --model claude-opus-4-20250514
            --allowedTools Read,Write,Edit,Bash(git:*),Bash(gh pr create:*),Bash(date:*)
