name: minds macOS smoke test

# Launch smoke test for the minds desktop app on a GitHub-hosted macOS runner.
#
# Hosted macOS runners cannot run the Lima VM (or Docker) a real minds agent
# needs -- they provide no nested virtualization. So this verifies everything
# up to and including the create form rendering: app install, Electron launch,
# backend startup, one-time-code auth, landing page, create form. It does not
# create an agent (that needs a self-hosted macOS runner; see PR #1729).
#
# Trigger from the Actions tab ("Run workflow") or:
#   gh workflow run minds-mac-smoke.yml --ref <branch>

# NOTE: the `push` trigger is temporary -- it exists only so the smoke test
# can be exercised on the `mngr/minds-mac-ci` branch before it reaches `main`
# (a `workflow_dispatch`-only workflow is not dispatchable until its file is
# on the default branch). Remove it before merging.
on:
  push:
    branches: [mngr/minds-mac-ci]
  workflow_dispatch:

concurrency:
  group: minds-mac-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  launch-smoke:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.1.0 requires Node >= 22.13.
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/minds/pnpm-lock.yaml

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Install minds Electron dependencies
        working-directory: apps/minds
        run: pnpm install --frozen-lockfile

      - name: Fetch Tailwind bundle
        run: bash apps/minds/scripts/fetch_tailwind.sh

      # integ_check.py points MINDS_WORKSPACE_GIT_URL at this path to pre-fill
      # the create form. Launch-only never clones it, but the path must exist.
      - name: Check out forever-claude-template
        run: |
          git clone --depth 1 --branch pilot \
            https://github.com/imbue-ai/forever-claude-template.git \
            .external_worktrees/forever-claude-template

      - name: Run launch smoke test
        # SKIP_AUTH=1 bypasses the one-time-code login (same as the minds
        # e2e test). Electron consumes the single-use code on startup, so the
        # CDP-driven content view integ_check.py drives cannot consume it
        # again; SKIP_AUTH makes the backend treat every session as authed.
        env:
          SKIP_AUTH: '1'
        run: |
          eval "$(uv run minds env activate production)"
          uv run python apps/minds/scripts/integ_check.py --launch-only

      - name: Collect logs
        if: always()
        run: |
          mkdir -p smoke-logs
          cp /tmp/minds-integ-test.log smoke-logs/ 2>/dev/null || true
          cp ~/.minds/logs/minds.log smoke-logs/ 2>/dev/null || true
          cp ~/.minds/logs/minds-events.jsonl smoke-logs/ 2>/dev/null || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-smoke-logs
          path: smoke-logs/
          retention-days: 14
